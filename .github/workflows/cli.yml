name: cli
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["cli/**", "templates/**", ".github/workflows/cli.yml"]
  pull_request:
    paths: ["cli/**", "templates/**", ".github/workflows/cli.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - run: python -m pytest
