name: interop
# The cross-language parity guarantee: a component in each language exchanging MQTT
# messages. Runs whenever any library or the test infra changes.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["libs/**", "schema/**", "test-infra/**", ".github/workflows/interop.yml"]
  pull_request:
    paths: ["libs/**", "schema/**", "test-infra/**", ".github/workflows/interop.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Guarantee every language library embeds the SAME config schema: each lib carries a
  # copy of schema/ggcommons-config-schema.json (cargo include_str!, tsc import, Python
  # package-data, Java classpath resource). This fails if any copy drifts from the
  # canonical source — run ./schema/sync-schema.sh and commit to fix.
  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify per-lib config schema copies match the canonical source
        run: bash schema/sync-schema.sh --check

  interop:
    runs-on: ubuntu-latest
    services:
      emqx:
        image: emqx/emqx:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: test-infra/interop/rust_node
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for the MQTT broker
        run: |
          python - <<'PY'
          import socket, time
          for _ in range(60):
              try:
                  with socket.create_connection(("localhost", 1883), 1):
                      print("broker up"); break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("broker never came up")
          PY

      - name: Build the Java shaded jar (the interop test compiles against it)
        run: mvn -B -ntp -DskipTests package
        working-directory: libs/java

      - name: Install the Python library + pytest (the interop matrix runner)
        run: pip install pytest -e libs/python

      - name: Run the cross-language interop matrix (request/reply + raw)
        run: python -m pytest test-infra/interop/test_interop.py -v
