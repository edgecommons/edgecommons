name: java
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["libs/java/**", ".github/workflows/java.yml"]
  pull_request:
    paths: ["libs/java/**", ".github/workflows/java.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: libs/rust-streamlog
      # The ggstreamlog cdylib is bundled into the jar and loaded by the streaming Panama
      # binding test + the durable-CloudWatch metric tests; build it before mvn, else those
      # tests self-skip and the JaCoCo bundle coverage dips below the 90% gate.
      - name: Build the ggstreamlog cdylib
        run: cargo build --release --features cabi,kinesis
        working-directory: libs/rust-streamlog
      # The broker-backed TLS/dual-broker tests self-skip (JUnit assumptions) without
      # GGCOMMONS_TLS_CERTS_DIR; the in-process Moquette + unit tests run + coverage gate.
      - run: mvn -B -ntp clean verify
