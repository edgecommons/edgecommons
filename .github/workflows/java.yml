name: java
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["libs/java/**", ".github/workflows/java.yml"]
  pull_request:
    paths: ["libs/java/**", ".github/workflows/java.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/java
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the merge base with the PR base branch.
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: libs/rust-streamlog
      # The edgestreamlog cdylib is bundled into the jar and loaded by the streaming Panama
      # binding test + the durable-CloudWatch metric tests; build it before mvn, else those
      # tests self-skip and the JaCoCo bundle coverage dips below the 90% gate.
      - name: Build the edgestreamlog cdylib
        run: cargo build --release --features cabi,kinesis
        working-directory: libs/rust-streamlog
      # The broker-backed TLS/dual-broker tests self-skip (JUnit assumptions) without
      # EDGECOMMONS_TLS_CERTS_DIR; the in-process Moquette + unit tests run + the 92% JaCoCo
      # BUNDLE line gate (pom.xml), which also writes target/site/jacoco/jacoco.xml.
      - run: mvn -B -ntp clean verify

      # The bundle average is a lagging indicator: a large under-tested change barely moves it. The
      # diff gate asks the question that matters on day one — is the code THIS pr changed tested? —
      # and holds every changed line to 95%. A PR that changes no Java source has no changed lines
      # and passes trivially. --src-roots maps JaCoCo's package/sourcefile pairs back onto the
      # repo-root-relative paths `git diff` reports.
      - name: Diff coverage gate (95% of changed lines)
        working-directory: ${{ github.workspace }}
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pip install diff-cover
          diff-cover libs/java/target/site/jacoco/jacoco.xml \
            --src-roots libs/java/src/main/java \
            --compare-branch=origin/main --fail-under=95
