name: ts
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["libs/ts/**", "libs/rust-streamlog/bindings/node/**", "package.json", "package-lock.json", ".github/workflows/ts.yml"]
  pull_request:
    paths: ["libs/ts/**", "libs/rust-streamlog/bindings/node/**", "package.json", "package-lock.json", ".github/workflows/ts.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # A broker so the STANDALONE provider + lifecycle integration tests run (they
    # self-skip without one, which would let coverage fall below the threshold).
    services:
      emqx:
        image: emqx/emqx:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # The durable-CloudWatch + streaming tests load the native edgestreamlog node addon,
      # so build it before the suite (mirrors the streaming workflow's node job).
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the native node addon
        run: npm install && npm run build
        working-directory: libs/rust-streamlog/bindings/node
      # Install the whole npm workspace from the repo root (libs/ts, its native
      # streaming binding, and the TS example) so cross-package deps link cleanly.
      - run: npm ci || npm install
      - run: npm run build --workspace=@edgecommons/edgecommons
      # `coverage` runs the full suite AND enforces the >=90% statements/lines gate
      # (thresholds in vitest.config.ts).
      - run: npm run coverage --workspace=@edgecommons/edgecommons
