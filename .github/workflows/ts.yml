name: ts
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["libs/ts/**", "libs/rust-streamlog/bindings/node/**", "package.json", "package-lock.json", ".github/workflows/ts.yml"]
  pull_request:
    paths: ["libs/ts/**", "libs/rust-streamlog/bindings/node/**", "package.json", "package-lock.json", ".github/workflows/ts.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # A broker so the STANDALONE provider + lifecycle integration tests run (they
    # self-skip without one, which would let coverage fall below the threshold).
    services:
      emqx:
        image: emqx/emqx:latest
        ports:
          - 1883:1883
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the merge base with the PR base branch.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The durable-CloudWatch + streaming tests load the native edgestreamlog node addon,
      # so build it before the suite (mirrors the streaming workflow's node job).
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the native node addon
        run: npm install && npm run build
        working-directory: libs/rust-streamlog/bindings/node
      # Install the whole npm workspace from the repo root (libs/ts, its native
      # streaming binding, and the TS example) so cross-package deps link cleanly.
      - run: npm ci || npm install
      - run: npm run build --workspace=@edgecommons/edgecommons
      # `coverage` runs the full suite AND enforces the >=92% statements/lines gate
      # (thresholds in vitest.config.ts); its cobertura reporter writes
      # libs/ts/coverage/cobertura-coverage.xml for the diff-coverage gate below.
      - run: npm run coverage --workspace=@edgecommons/edgecommons

      # The bundle average is a lagging indicator: a large under-tested change barely moves it. The
      # diff gate asks the question that matters on day one — is the code THIS pr changed tested? —
      # and holds every changed line to 95%. A PR that changes no TypeScript source has no changed
      # lines and passes trivially.
      - name: Diff coverage gate (95% of changed lines)
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pip install diff-cover
          diff-cover libs/ts/coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=95
