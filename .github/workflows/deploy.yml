name: Deploy docs (Cloudflare Pages)

# Builds the Starlight docs site in website/ and deploys it to Cloudflare Pages.
# Path-filtered to website/** so it never runs for unrelated changes, and gated to
# the main branch so feature-branch pushes cost zero Actions minutes.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# Allow one concurrent deployment; cancel superseded in-progress runs.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Create the Pages project once (name must match), then bind the custom
          # domain docs.ggcommons.mbreissi.com to it in the Cloudflare dashboard.
          command: pages deploy dist --project-name=ggcommons-docs --branch=main
          workingDirectory: website
