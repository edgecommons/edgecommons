name: release
# Independent, per-artifact releases via path-scoped tags, e.g.:
#   git tag python-lib/v0.3.0 && git push origin python-lib/v0.3.0
# Each tag prefix selects which package to build + publish. Fill in the publish
# steps + registry credentials (Maven Central/CodeArtifact, PyPI, crates.io) for
# your environment; this is a scaffold.
#
# The `streaming/v*` prefix is wired below: it builds the prebuilt native streaming
# artifacts (PyO3 wheel, napi-rs addon, native-bundled Java jar) across the four
# supported targets and publishes them. See docs/NATIVE_CORE_DELIVERY.md.
# Publish steps run only when the matching registry secret is set, so a tag push
# (or a manual workflow_dispatch) without creds still builds + uploads the artifacts.
on:
  # Manual prebuild runs: builds + uploads the native artifacts to the run for inspection.
  # Publish steps stay gated on registry secrets, so dispatch never publishes by itself.
  workflow_dispatch:
  push:
    tags:
      - "java-lib/v*"
      - "ts-lib/v*"
      - "python-lib/v*"
      - "rust-lib/v*"
      - "cli/v*"
      - "streaming/v*"

# Serialize runs for the same tag, but never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Per-artifact publish for the pure-source libs (tag push only; not streaming/*) ---
  # GitHub-native private distribution (DESIGN-packaging §13): java-lib + ts-lib publish to
  # GitHub Packages (Maven/npm) via the built-in GITHUB_TOKEN; python-lib + rust-lib are
  # consumed via git refs (pip git+https@<tag> / cargo git dep tag = "<tag>"), so their tag
  # IS the release (a dist/package is built for inspection). Each step is guarded on the tag
  # prefix; nothing publishes without a deliberate `<artifact>/v*` tag push.
  release:
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'streaming/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # GitHub Packages (Maven/npm) via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
      - name: Identify the artifact from the tag
        id: which
        run: echo "artifact=${GITHUB_REF_NAME%%/*}" >> "$GITHUB_OUTPUT"

      # java-lib -> GitHub Packages Maven (com.mbreissi:ggcommons; <distributionManagement> id=github)
      - name: Set up JDK (java-lib)
        if: ${{ steps.which.outputs.artifact == 'java-lib' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Publish java-lib to GitHub Packages
        if: ${{ steps.which.outputs.artifact == 'java-lib' }}
        working-directory: libs/java
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp -DskipTests deploy

      # ts-lib -> GitHub Packages npm (@mbreissi/ggcommons). Built via the npm WORKSPACE at the
      # repo root (mirrors ts.yml): the native streaming binding is a workspace member, so it must
      # be built + linked locally — `npm ci` in libs/ts alone would 404 trying to fetch it. Publish
      # only the @mbreissi/ggcommons package; the binding is an optional dep consumers may skip.
      - name: Set up Node (ts-lib)
        if: ${{ steps.which.outputs.artifact == 'ts-lib' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@mbreissi"
      - name: Set up Rust (ts-lib native binding)
        if: ${{ steps.which.outputs.artifact == 'ts-lib' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Build the native node addon
        if: ${{ steps.which.outputs.artifact == 'ts-lib' }}
        working-directory: libs/rust-streamlog/bindings/node
        run: npm install && npm run build
      - name: Build & publish ts-lib to GitHub Packages
        if: ${{ steps.which.outputs.artifact == 'ts-lib' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci || npm install
          npm run build --workspace=@mbreissi/ggcommons
          npm publish --workspace=@mbreissi/ggcommons

      # python-lib / cli -> build the dist (consumed via pip git+https@<tag>; add twine upload when a
      # PyPI/CodeArtifact token is configured — DESIGN-packaging §13).
      - name: Set up Python (python-lib / cli)
        if: ${{ steps.which.outputs.artifact == 'python-lib' || steps.which.outputs.artifact == 'cli' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build python-lib
        if: ${{ steps.which.outputs.artifact == 'python-lib' }}
        working-directory: libs/python
        run: pipx run build
      - name: Build cli
        if: ${{ steps.which.outputs.artifact == 'cli' }}
        working-directory: cli
        run: pipx run build
      - name: Upload python dist
        if: ${{ steps.which.outputs.artifact == 'python-lib' || steps.which.outputs.artifact == 'cli' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.which.outputs.artifact }}-dist
          path: "**/dist/*"
          if-no-files-found: warn

      # rust-lib -> the tag IS the release (consumed via a cargo git dep `tag = "rust-lib/v<X>"`);
      # build-check the crate. Add `cargo publish` when the crates.io name is claimed + a token set.
      - name: Set up Rust (rust-lib)
        if: ${{ steps.which.outputs.artifact == 'rust-lib' }}
        uses: dtolnay/rust-toolchain@stable
      - name: Build-check rust-lib
        if: ${{ steps.which.outputs.artifact == 'rust-lib' }}
        working-directory: libs/rust
        run: cargo build --release

      - run: echo "Released ${{ github.ref_name }} (artifact=${{ steps.which.outputs.artifact }})."

  # ===========================================================================
  # streaming/v* (or manual dispatch): prebuilt native core across four targets
  #   linux x86_64 (glibc) · linux aarch64 (glibc) · windows x64 · macOS arm64
  # All are non-musl / glibc(+MSVC/Apple). For musl/Alpine or a reduced feature
  # set, build from source per docs/NATIVE_CORE_DELIVERY.md.
  #
  # The aarch64-linux artifacts are TRUE-CROSS-COMPILED on x86_64 `ubuntu-latest`
  # (cross-rs for the cdylib/addon, maturin-action for the wheel) so this works on
  # a free private plan with no arm64 hosted runners. aarch64-linux ships `kinesis`
  # only (durable buffer + Kinesis) — Kafka's librdkafka(C) cross to arm64 is
  # impractical, so Kafka on arm64 is a documented source build. The other three
  # targets build natively with the full kinesis+kafka set. See Cross.toml.
  # ===========================================================================

  # --- PyO3 wheel (maturin), one abi3 wheel per platform (Python 3.9+) ----------
  streaming-python:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming wheel (PyO3 ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
            features: kinesis,kafka
          - os: ubuntu-latest      # linux aarch64 (glibc) — cross-built; no kafka (librdkafka C)
            target: aarch64-unknown-linux-gnu
            features: kinesis
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
            features: kinesis,kafka
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
            features: kinesis,kafka
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # The durable buffer + callback sink are always in; kinesis/kafka add the real sinks.
      # aarch64-linux ships kinesis only — librdkafka(C) cross to arm64 is impractical (build from
      # source for Kafka on arm64; see docs/NATIVE_CORE_DELIVERY.md). The before-script installs deps
      # for whichever package manager the (cross) image uses: dnf = manylinux (kafka: libcurl/zlib),
      # apt = the aarch64 cross image (aws-lc crypto: cmake + Go).
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then dnf install -y cmake libcurl-devel zlib-devel; fi
            if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y --no-install-recommends cmake golang-go libcurl4-openssl-dev zlib1g-dev; fi
          args: >-
            --release --out dist --features ${{ matrix.features }}
            --manifest-path libs/rust-streamlog/bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-wheel-${{ matrix.target }}
          path: dist/*.whl
      # Publish only when a PyPI token is configured (maturin reads MATURIN_PYPI_TOKEN).
      - name: Publish wheel to PyPI
        if: ${{ env.MATURIN_PYPI_TOKEN != '' }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        run: pipx run maturin upload --skip-existing dist/*.whl

  # --- napi-rs addon, one prebuild per platform --------------------------------
  # aarch64-linux is true-cross-compiled (cross-rs, --cross-compile) with kinesis only;
  # other targets build natively with the full kinesis+kafka set.
  streaming-node:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming addon (napi-rs ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
            features: kinesis,kafka
          - os: ubuntu-latest      # linux aarch64 (glibc) — true cross via cross-rs; no kafka
            target: aarch64-unknown-linux-gnu
            features: kinesis
            cross: true
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
            features: kinesis,kafka
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
            features: kinesis,kafka
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # kafka builds librdkafka via cmake (libcurl/zlib dev headers on the native Linux runner).
      - name: Install librdkafka build deps (Linux native)
        if: ${{ runner.os == 'Linux' && !matrix.cross }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev zlib1g-dev
      - name: Install cross (aarch64 true cross-compile)
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build the platform addon
        working-directory: libs/rust-streamlog/bindings/node
        shell: bash
        env:
          CROSS_CONFIG: ${{ github.workspace }}/Cross.toml
        run: |
          npm install
          if [ "${{ matrix.cross }}" = "true" ]; then
            npx napi build --platform --release --target ${{ matrix.target }} --features ${{ matrix.features }} --use-cross
          else
            npx napi build --platform --release --target ${{ matrix.target }} --features ${{ matrix.features }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-addon-${{ matrix.target }}
          path: libs/rust-streamlog/bindings/node/*.node
      # Publish the per-platform npm package only when an npm token is configured.
      - name: Publish addon to npm
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: libs/rust-streamlog/bindings/node
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npm publish --access public

  # --- native-bundled Java jar: build the cdylib per platform, then assemble ----
  # ONE jar carrying every platform's native under /native/<os>-<arch>/ (the FFM
  # loader picks the right one at runtime). All features: cabi + kinesis + kafka
  # (kafka builds librdkafka via cmake — preinstalled on the GitHub runners).
  streaming-java-natives:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming cdylib (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest          # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
            features: cabi,kinesis,kafka
          - os: ubuntu-latest          # linux aarch64 (glibc) — true cross via cross-rs; no kafka
            target: aarch64-unknown-linux-gnu
            features: cabi,kinesis
            cross: true
          - os: windows-latest         # windows x64 (dev)
            target: x86_64-pc-windows-msvc
            features: cabi,kinesis,kafka
          - os: macos-14               # macOS arm64 (dev)
            target: aarch64-apple-darwin
            features: cabi,kinesis,kafka
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # kafka builds librdkafka via cmake (libcurl/zlib dev headers on the native Linux runner).
      - name: Install librdkafka build deps (Linux native)
        if: ${{ runner.os == 'Linux' && !matrix.cross }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libcurl4-openssl-dev zlib1g-dev
      - name: Install cross (aarch64 true cross-compile)
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build the cdylib
        working-directory: libs/rust-streamlog
        shell: bash
        env:
          CROSS_CONFIG: ${{ github.workspace }}/Cross.toml
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --features ${{ matrix.features }} --target ${{ matrix.target }}
          else
            cargo build --release --features ${{ matrix.features }}
          fi
      - name: Stage the platform native under <os>-<arch>/ (matching GgStreamNative.osArch)
        shell: bash
        run: |
          set -euo pipefail
          # cross outputs to target/<triple>/release; native cargo to target/release.
          if [ "${{ matrix.cross }}" = "true" ]; then
            src="libs/rust-streamlog/target/${{ matrix.target }}/release"
          else
            src="libs/rust-streamlog/target/release"
          fi
          case "${{ matrix.target }}" in
            *windows*) os=windows; lib=ggstreamlog.dll ;;
            *apple*)   os=darwin;  lib=libggstreamlog.dylib ;;
            *)         os=linux;   lib=libggstreamlog.so ;;
          esac
          case "${{ matrix.target }}" in
            x86_64*)  arch=x86_64 ;;
            aarch64*) arch=aarch64 ;;
            *)        arch=unknown ;;
          esac
          dest="native/${os}-${arch}"
          mkdir -p "$dest"
          cp "$src/$lib" "$dest/"
          echo "staged $lib -> $dest/"
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-native-${{ matrix.target }}
          path: native/

  streaming-java-jar:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming jar (native-bundled)
    needs: streaming-java-natives
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # deploy to GitHub Packages via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github     # matches <distributionManagement> id in libs/java/pom.xml
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Collect every platform's native into the resources tree
        uses: actions/download-artifact@v4
        with:
          pattern: streaming-native-*
          merge-multiple: true
          path: libs/java/src/main/resources/native
      - name: List bundled natives
        run: find libs/java/src/main/resources/native -type f
      # Package the jar with all platform natives embedded. Tests are skipped here
      # (the gated native test runs in the streaming workflow); this job produces
      # the release artifact. Deploy only when Maven creds are configured.
      - name: Build the native-bundled jar
        run: mvn -B -ntp -DskipTests package
        working-directory: libs/java
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-java-jar
          path: libs/java/target/*.jar
      - name: Deploy to GitHub Packages
        # Tag-only: a workflow_dispatch run builds + uploads the jar artifact but never
        # publishes. Auth uses the built-in GITHUB_TOKEN (no separate secret) + packages: write.
        if: ${{ startsWith(github.ref_name, 'streaming/') }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp -DskipTests deploy
        working-directory: libs/java
