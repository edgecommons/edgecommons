name: release
# Independent, per-artifact releases via path-scoped tags, e.g.:
#   git tag python-lib/v0.3.0 && git push origin python-lib/v0.3.0
# Each tag prefix selects which package to build + publish. Fill in the publish
# steps + registry credentials (Maven Central/CodeArtifact, PyPI, crates.io) for
# your environment; this is a scaffold.
#
# The `streaming/v*` prefix is wired below: it builds the prebuilt native streaming
# artifacts (PyO3 wheel, napi-rs addon, native-bundled Java jar) across the four
# supported targets and publishes them. See docs/NATIVE_CORE_DELIVERY.md.
# Publish steps run only when the matching registry secret is set, so a tag push
# (or a manual workflow_dispatch) without creds still builds + uploads the artifacts.
on:
  # Manual prebuild runs: builds + uploads the native artifacts to the run for inspection.
  # Publish steps stay gated on registry secrets, so dispatch never publishes by itself.
  workflow_dispatch:
  push:
    tags:
      - "java-lib/v*"
      - "python-lib/v*"
      - "rust-lib/v*"
      - "cli/v*"
      - "streaming/v*"

# Serialize runs for the same tag, but never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Scaffold publish for the pure-source libs (tag push only; not streaming/*) ---
  release:
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'streaming/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Identify the artifact from the tag
        id: which
        run: echo "artifact=${GITHUB_REF_NAME%%/*}" >> "$GITHUB_OUTPUT"
      # --- Wire up per-artifact publish below (guarded on steps.which.outputs.artifact) ---
      # java-lib   -> (cd libs/java   && mvn -B -ntp deploy)        # needs Maven settings/creds
      # python-lib -> (cd libs/python && python -m build && twine upload dist/*)
      # rust-lib   -> (cd libs/rust   && cargo publish)             # needs CARGO_REGISTRY_TOKEN
      # cli        -> (cd cli         && python -m build && twine upload dist/*)
      - run: echo "Release ${{ github.ref_name }} (artifact=${{ steps.which.outputs.artifact }}) — wire up publish steps."

  # ===========================================================================
  # streaming/v* (or manual dispatch): prebuilt native core across four targets
  #   linux x86_64 (glibc) · linux aarch64 (glibc) · windows x64 · macOS arm64
  # All are non-musl / glibc(+MSVC/Apple). For musl/Alpine or a reduced feature
  # set, build from source per docs/NATIVE_CORE_DELIVERY.md.
  #
  # The aarch64-linux artifacts are CROSS-BUILT on x86_64 `ubuntu-latest` so this
  # works on a free private plan (no arm64 hosted runners): maturin-action builds
  # the wheel via its QEMU/manylinux cross flow, and the node addon + Java cdylib
  # build inside an emulated arm64 container (QEMU), so the librdkafka/cmake build
  # and the path-dep workspace resolve as if native. Slower than native, but the
  # release workflow is infrequent.
  # ===========================================================================

  # --- PyO3 wheel (maturin), one abi3 wheel per platform (Python 3.9+) ----------
  streaming-python:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming wheel (PyO3 ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest      # linux aarch64 (glibc) — maturin-action cross-builds (QEMU)
            target: aarch64-unknown-linux-gnu
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # `kinesis` + `kafka` = the real AWS Kinesis sink + the Kafka sink (the durable buffer +
      # callback sink are always in). manylinux_2_28 only applies to the Linux targets (ignored on
      # windows/macos). Kafka builds librdkafka via cmake, so install cmake inside the manylinux
      # container; the windows/macos runners already ship cmake.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          before-script-linux: |
            command -v cmake >/dev/null 2>&1 || dnf install -y cmake || yum install -y cmake
          args: >-
            --release --out dist --features kinesis,kafka
            --manifest-path libs/rust-streamlog/bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-wheel-${{ matrix.target }}
          path: dist/*.whl
      # Publish only when a PyPI token is configured (maturin reads MATURIN_PYPI_TOKEN).
      - name: Publish wheel to PyPI
        if: ${{ env.MATURIN_PYPI_TOKEN != '' }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        run: pipx run maturin upload --skip-existing dist/*.whl

  # --- napi-rs addon, one prebuild per platform --------------------------------
  # aarch64-linux builds inside an emulated arm64 container (QEMU) so it works on a
  # free private plan without arm64 runners; librdkafka/cmake + the path-dep crate
  # resolve as if native. Other targets build natively on their runner.
  streaming-node:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming addon (napi-rs ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest      # linux aarch64 (glibc) — emulated arm64 container
            target: aarch64-unknown-linux-gnu
            emulate: true
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # ---- native build (linux x86_64 / windows / macOS) ----
      - uses: actions/setup-node@v4
        if: ${{ !matrix.emulate }}
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.emulate }}
        with:
          targets: ${{ matrix.target }}
      # kafka builds librdkafka via cmake — preinstalled on the GitHub-hosted runners.
      - name: Build the platform addon (native)
        if: ${{ !matrix.emulate }}
        working-directory: libs/rust-streamlog/bindings/node
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }} --features kinesis,kafka
      # ---- aarch64-linux: build inside an emulated arm64 container (cmake/gcc/rust native) ----
      - uses: docker/setup-qemu-action@v3
        if: ${{ matrix.emulate }}
      - name: Build the platform addon (emulated aarch64)
        if: ${{ matrix.emulate }}
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w \
            -w /w/libs/rust-streamlog/bindings/node node:20-bookworm bash -lc '
              set -e
              apt-get update && apt-get install -y --no-install-recommends cmake curl build-essential
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . "$HOME/.cargo/env"
              npm install
              npx napi build --platform --release --features kinesis,kafka'
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-addon-${{ matrix.target }}
          path: libs/rust-streamlog/bindings/node/*.node
      # Publish the per-platform npm package only when an npm token is configured (native runners;
      # the emulated arm64 .node is uploaded as an artifact for assembly/inspection).
      - name: Publish addon to npm
        if: ${{ !matrix.emulate && env.NODE_AUTH_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: libs/rust-streamlog/bindings/node
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npm publish --access public

  # --- native-bundled Java jar: build the cdylib per platform, then assemble ----
  # ONE jar carrying every platform's native under /native/<os>-<arch>/ (the FFM
  # loader picks the right one at runtime). All features: cabi + kinesis + kafka
  # (kafka builds librdkafka via cmake — preinstalled on the GitHub runners).
  streaming-java-natives:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming cdylib (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest          # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest          # linux aarch64 (glibc) — emulated arm64 container
            target: aarch64-unknown-linux-gnu
            emulate: true
          - os: windows-latest         # windows x64 (dev)
            target: x86_64-pc-windows-msvc
          - os: macos-14               # macOS arm64 (dev)
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # ---- native build ----
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.emulate }}
      - name: Build the cdylib (native — cabi + kinesis + kafka)
        if: ${{ !matrix.emulate }}
        run: cargo build --release --features cabi,kinesis,kafka
        working-directory: libs/rust-streamlog
      # ---- aarch64-linux: build inside an emulated arm64 container (cmake/gcc/rust native) ----
      - uses: docker/setup-qemu-action@v3
        if: ${{ matrix.emulate }}
      - name: Build the cdylib (emulated aarch64 — cabi + kinesis + kafka)
        if: ${{ matrix.emulate }}
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w/libs/rust-streamlog \
            rust:1-bookworm bash -lc '
              set -e
              apt-get update && apt-get install -y --no-install-recommends cmake
              cargo build --release --features cabi,kinesis,kafka'
      - name: Stage the platform native under <os>-<arch>/ (matching GgStreamNative.osArch)
        shell: bash
        run: |
          set -euo pipefail
          # Both native and emulated builds output to target/release (no per-triple subdir).
          src=libs/rust-streamlog/target/release
          case "${{ matrix.target }}" in
            *windows*) os=windows; lib=ggstreamlog.dll ;;
            *apple*)   os=darwin;  lib=libggstreamlog.dylib ;;
            *)         os=linux;   lib=libggstreamlog.so ;;
          esac
          case "${{ matrix.target }}" in
            x86_64*)  arch=x86_64 ;;
            aarch64*) arch=aarch64 ;;
            *)        arch=unknown ;;
          esac
          dest="native/${os}-${arch}"
          mkdir -p "$dest"
          cp "$src/$lib" "$dest/"
          echo "staged $lib -> $dest/"
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-native-${{ matrix.target }}
          path: native/

  streaming-java-jar:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming jar (native-bundled)
    needs: streaming-java-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Collect every platform's native into the resources tree
        uses: actions/download-artifact@v4
        with:
          pattern: streaming-native-*
          merge-multiple: true
          path: libs/java/src/main/resources/native
      - name: List bundled natives
        run: find libs/java/src/main/resources/native -type f
      # Package the jar with all platform natives embedded. Tests are skipped here
      # (the gated native test runs in the streaming workflow); this job produces
      # the release artifact. Deploy only when Maven creds are configured.
      - name: Build the native-bundled jar
        run: mvn -B -ntp -DskipTests package
        working-directory: libs/java
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-java-jar
          path: libs/java/target/*.jar
      - name: Deploy to Maven registry
        if: ${{ env.MAVEN_DEPLOY_TOKEN != '' }}
        env:
          MAVEN_DEPLOY_TOKEN: ${{ secrets.MAVEN_DEPLOY_TOKEN }}
        run: mvn -B -ntp -DskipTests deploy
        working-directory: libs/java
