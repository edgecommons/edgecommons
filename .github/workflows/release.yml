name: release
# Independent, per-artifact releases via path-scoped tags, e.g.:
#   git tag python-lib/v0.3.0 && git push origin python-lib/v0.3.0
# Each tag prefix selects which package to build + publish. Fill in the publish
# steps + registry credentials (Maven Central/CodeArtifact, PyPI, crates.io) for
# your environment; this is a scaffold.
#
# The `streaming/v*` prefix is wired below: it builds the prebuilt native streaming
# artifacts (PyO3 wheel, napi-rs addon, native-bundled Java jar) across the four
# supported targets and publishes them. See docs/NATIVE_CORE_DELIVERY.md.
# Publish steps run only when the matching registry secret is set, so a tag push
# (or a manual workflow_dispatch) without creds still builds + uploads the artifacts.
on:
  # Manual prebuild runs: builds + uploads the native artifacts to the run for inspection.
  # Publish steps stay gated on registry secrets, so dispatch never publishes by itself.
  workflow_dispatch:
  push:
    tags:
      - "java-lib/v*"
      - "python-lib/v*"
      - "rust-lib/v*"
      - "cli/v*"
      - "streaming/v*"

# Serialize runs for the same tag, but never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Scaffold publish for the pure-source libs (tag push only; not streaming/*) ---
  release:
    if: ${{ github.event_name == 'push' && !startsWith(github.ref_name, 'streaming/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Identify the artifact from the tag
        id: which
        run: echo "artifact=${GITHUB_REF_NAME%%/*}" >> "$GITHUB_OUTPUT"
      # --- Wire up per-artifact publish below (guarded on steps.which.outputs.artifact) ---
      # java-lib   -> (cd libs/java   && mvn -B -ntp deploy)        # needs Maven settings/creds
      # python-lib -> (cd libs/python && python -m build && twine upload dist/*)
      # rust-lib   -> (cd libs/rust   && cargo publish)             # needs CARGO_REGISTRY_TOKEN
      # cli        -> (cd cli         && python -m build && twine upload dist/*)
      - run: echo "Release ${{ github.ref_name }} (artifact=${{ steps.which.outputs.artifact }}) — wire up publish steps."

  # ===========================================================================
  # streaming/v* (or manual dispatch): prebuilt native core across four targets
  #   linux x86_64 (glibc) · linux aarch64 (glibc) · windows x64 · macOS arm64
  # All are non-musl / glibc(+MSVC/Apple). For musl/Alpine or a reduced feature
  # set, build from source per docs/NATIVE_CORE_DELIVERY.md.
  #
  # NOTE: the aarch64-linux jobs run on `ubuntu-24.04-arm` (native arm64 hosted
  # runners). These are free for PUBLIC repos but need a Team/Enterprise plan for
  # PRIVATE repos. On a free private plan, switch those entries to cross-compile on
  # ubuntu-latest: maturin-action cross-builds the wheel as-is; node adds
  # `--use-napi-cross`; the Java cdylib uses `cross`/`cargo-zigbuild`. See the doc.
  # ===========================================================================

  # --- PyO3 wheel (maturin), one abi3 wheel per platform (Python 3.9+) ----------
  streaming-python:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming wheel (PyO3 ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm   # linux aarch64 (glibc) — native arm64 runner
            target: aarch64-unknown-linux-gnu
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # `kinesis` = the real AWS Kinesis sink (the durable buffer + callback sink are always in).
      # manylinux_2_28 only applies to the Linux targets; it's ignored on windows/macos.
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          args: >-
            --release --out dist --features kinesis
            --manifest-path libs/rust-streamlog/bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-wheel-${{ matrix.target }}
          path: dist/*.whl
      # Publish only when a PyPI token is configured (maturin reads MATURIN_PYPI_TOKEN).
      - name: Publish wheel to PyPI
        if: ${{ env.MATURIN_PYPI_TOKEN != '' }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        run: pipx run maturin upload --skip-existing dist/*.whl

  # --- napi-rs addon, one prebuild per platform --------------------------------
  streaming-node:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming addon (napi-rs ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest      # linux x86_64 (glibc)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm   # linux aarch64 (glibc) — native arm64 runner
            target: aarch64-unknown-linux-gnu
          - os: windows-latest     # windows x64 (dev)
            target: x86_64-pc-windows-msvc
          - os: macos-14           # macOS arm64 (dev)
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: libs/rust-streamlog/bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm install
      - name: Build the platform addon
        run: npx napi build --platform --release --target ${{ matrix.target }} --features kinesis
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-addon-${{ matrix.target }}
          path: libs/rust-streamlog/bindings/node/*.node
      # Publish the per-platform npm package only when an npm token is configured.
      - name: Publish addon to npm
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npm publish --access public

  # --- native-bundled Java jar: build the cdylib per platform, then assemble ----
  # ONE jar carrying every platform's native under /native/<os>-<arch>/ (the FFM
  # loader picks the right one at runtime). All features: cabi + kinesis + kafka
  # (kafka builds librdkafka via cmake — preinstalled on the GitHub runners).
  streaming-java-natives:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming cdylib (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the cdylib (cabi + kinesis + kafka)
        run: cargo build --release --features cabi,kinesis,kafka
        working-directory: libs/rust-streamlog
      - name: Stage the platform native under <os>-<arch>/ (matching GgStreamNative.osArch)
        shell: bash
        run: |
          set -euo pipefail
          src=libs/rust-streamlog/target/release
          case "$(uname -m)" in
            x86_64|amd64)   arch=x86_64 ;;
            aarch64|arm64)  arch=aarch64 ;;
            *)              arch="$(uname -m)" ;;
          esac
          case "${{ runner.os }}" in
            Linux)   os=linux;   lib=libggstreamlog.so ;;
            Windows) os=windows; lib=ggstreamlog.dll ;;
            macOS)   os=darwin;  lib=libggstreamlog.dylib ;;
          esac
          dest="native/${os}-${arch}"
          mkdir -p "$dest"
          cp "$src/$lib" "$dest/"
          echo "staged $lib -> $dest/"
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-native-${{ matrix.os }}
          path: native/

  streaming-java-jar:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'streaming/') }}
    name: streaming jar (native-bundled)
    needs: streaming-java-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Collect every platform's native into the resources tree
        uses: actions/download-artifact@v4
        with:
          pattern: streaming-native-*
          merge-multiple: true
          path: libs/java/src/main/resources/native
      - name: List bundled natives
        run: find libs/java/src/main/resources/native -type f
      # Package the jar with all platform natives embedded. Tests are skipped here
      # (the gated native test runs in the streaming workflow); this job produces
      # the release artifact. Deploy only when Maven creds are configured.
      - name: Build the native-bundled jar
        run: mvn -B -ntp -DskipTests package
        working-directory: libs/java
      - uses: actions/upload-artifact@v4
        with:
          name: streaming-java-jar
          path: libs/java/target/*.jar
      - name: Deploy to Maven registry
        if: ${{ env.MAVEN_DEPLOY_TOKEN != '' }}
        env:
          MAVEN_DEPLOY_TOKEN: ${{ secrets.MAVEN_DEPLOY_TOKEN }}
        run: mvn -B -ntp -DskipTests deploy
        working-directory: libs/java
