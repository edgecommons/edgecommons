# Dallas bottling plant - the golden fixture.
# Expresses the bottling-company-test harness (sites/dallas-site) in the deployment-definition
# language. TRACEABILITY.md maps every element to the harness file it must regenerate and records
# every model gap found. Layer files under layers/ are mechanically extracted from the harness
# catalogs (single-sourced; derived keys stripped) - see TRACEABILITY.md "Extraction".
apiVersion: edgecommons.io/v1alpha1
kind: DeploymentDefinition
metadata:
  name: dallas-bottling
  description: >-
    Bottles-R-Us Dallas plant: a site node running the bus and console, a fully self-contained
    filling line gateway (local sims), and a packaging line gateway reading external PLCs.

hierarchy:
  levels: [enterprise, site, line, device]
  scopes:
    - id: enterprise/bottles-r-us
      parent: null
      layer: layers/scopes/enterprise-bottles-r-us.json
    - id: site/dallas
      parent: enterprise/bottles-r-us
      layer: layers/scopes/site-dallas.json
    - id: line/filling-line
      parent: site/dallas
      layer: layers/scopes/line-filling-line.json
    - id: line/packaging-line
      parent: site/dallas
      layer: layers/scopes/line-packaging-line.json

targetStandard:
  family: HOST
  exceptions: []

environments:
  - name: local
    protection: open
    bindings: bindings/local.json

nodes:
  # ---- Site node: the site bus + console. Attaches at site scope, so its derived catalog
  # levels are [enterprise, site, device] - exactly what the hand-written site catalog declares.
  - key: dallas-console
    scope: site/dallas
    identity:
      thingName: dallas-console
    localBroker:
      kind: emqx
      port: 1883
      env: { HOME: /var/lib/emqx, EMQX_ALLOW_ANONYMOUS: "true" }
      launch: { order: 10, user: emqx, startSecs: 10, startRetries: 5, stopWaitSecs: 30 }
    configProvider:
      configSource: FILE
      artifact: { source: { kind: sibling, repo: config-component } }
      layer: layers/provider/config-component.json
      catalogPath: /config/config-catalog.json
      versionBase: bottles-r-us-dallas-site
      messaging: { clientId: site-config-component }
      launch: { order: 15, waitFor: ["localhost:1883"], startSecs: 5, stopWaitSecs: 15 }
    components:
      - name: edge-console
        catalogKey: EdgeConsole
        artifact: { source: { kind: sibling, repo: edge-console } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/site/edge-console.json
        messaging: { clientId: edge-console, requestTimeoutSeconds: 30, file: console-messaging.json }
        launch:
          order: 20
          waitFor: ["localhost:1883"]
          exec: edge-console-gateway
          workingDir: /app/edge-console
          env: { MALLOC_ARENA_MAX: "2", EDGECONSOLE_WORKER_THREADS: "4" }
          startSecs: 5
          stopWaitSecs: 15

  # ---- Filling line gateway: fully self-contained (local field simulator).
  - key: gw-fill-01
    scope: line/filling-line
    identity:
      thingName: gw-fill-01
    localBroker:
      kind: emqx
      port: 1883
      env: { HOME: /var/lib/emqx, EMQX_ALLOW_ANONYMOUS: "true" }
      launch: { order: 10, user: emqx, startSecs: 10, startRetries: 5, stopWaitSecs: 30 }
    auxiliaries:
      - name: field-sim
        command: /opt/simenv/bin/python /opt/sims/dallas_filling_sim.py
        launch: { order: 20, startSecs: 3 }
    configProvider:
      configSource: FILE
      artifact: { source: { kind: sibling, repo: config-component } }
      layer: layers/provider/config-component.json
      catalogPath: /config/config-catalog.json
      messaging: { clientId: fill-config-component }
      launch: { order: 25, waitFor: ["localhost:1883"], startSecs: 5, stopWaitSecs: 15 }
    components:
      - name: opcua-adapter
        catalogKey: OpcUaAdapter
        artifact: { source: { kind: sibling, repo: opcua-adapter } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/filling-line/opcua-adapter.json
        messaging: { clientId: fill-opcua, type: mqtt, file: opcua-messaging.json }
        launch:
          order: 30
          waitFor: ["localhost:1883", "localhost:4840"]
          settleSeconds: 6
          exec: java --enable-native-access=ALL-UNNAMED -jar /app/opcua/app.jar
          startSecs: 8
          stopWaitSecs: 15
      - name: modbus-adapter
        catalogKey: ModbusAdapter
        artifact: { source: { kind: sibling, repo: modbus-adapter } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/filling-line/modbus-adapter.json
        messaging: { clientId: fill-modbus, type: mqtt, file: modbus-messaging.json }
        launch:
          order: 30
          waitFor: ["localhost:1883", "localhost:5020"]
          settleSeconds: 6
          exec: /opt/pyenv/bin/python /app/modbus/main.py
          workingDir: /app/modbus
          startSecs: 5
          stopWaitSecs: 15
      - name: telemetry-processor
        catalogKey: TelemetryProcessor
        artifact:
          source: { kind: sibling, repo: telemetry-processor, features: [standalone, streaming, streaming-file-parquet, scripting-lua] }
        configSource: CONFIG_COMPONENT
        layer: layers/components/filling-line/telemetry-processor.json
        files:
          - { from: "configs/lua/**", to: /scripts }
        messaging: { clientId: fill-telemetry, file: telemetry-messaging.json }
        launch: { order: 40, waitFor: ["localhost:1883"], settleSeconds: 6, startSecs: 5, stopWaitSecs: 15 }
      - name: file-replicator
        catalogKey: FileReplicator
        artifact:
          source: { kind: sibling, repo: file-replicator, features: [standalone] }
        configSource: CONFIG_COMPONENT
        layer: layers/components/filling-line/file-replicator.json
        messaging: { clientId: fill-filerep, file: filerep-messaging.json }
        launch: { order: 50, waitFor: ["localhost:1883"], settleSeconds: 6, startSecs: 5, stopWaitSecs: 15 }
      - name: uns-bridge
        catalogKey: UnsBridge
        artifact: { source: { kind: sibling, repo: uns-bridge } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/filling-line/uns-bridge.json
        messaging: { clientId: fill-bridge-local, requestTimeoutSeconds: 30, file: bridge-messaging.json }
        launch: { order: 28, waitFor: ["localhost:1883"], settleSeconds: 3, startSecs: 5, stopWaitSecs: 15 }

  # ---- Packaging line gateway: external PLCs (Kepware OPC UA + host Modbus) via bindings;
  # no local sims, no file replication.
  - key: gw-pack-01
    scope: line/packaging-line
    identity:
      thingName: gw-pack-01
    localBroker:
      kind: emqx
      port: 1883
      env: { HOME: /var/lib/emqx, EMQX_ALLOW_ANONYMOUS: "true" }
      launch: { order: 10, user: emqx, startSecs: 10, startRetries: 5, stopWaitSecs: 30 }
    configProvider:
      configSource: FILE
      artifact: { source: { kind: sibling, repo: config-component } }
      layer: layers/provider/config-component.json
      catalogPath: /run/config/config-catalog.json
      messaging: { clientId: pack-config-component }
      launch: { order: 25, waitFor: ["localhost:1883"], startSecs: 5, stopWaitSecs: 15 }
    components:
      - name: opcua-adapter
        catalogKey: OpcUaAdapter
        artifact: { source: { kind: sibling, repo: opcua-adapter } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/packaging-line/opcua-adapter.json
        messaging: { clientId: pack-opcua, type: mqtt, file: opcua-messaging.json }
        launch:
          order: 30
          waitFor: ["localhost:1883"]
          settleSeconds: 6
          exec: java --enable-native-access=ALL-UNNAMED -jar /app/opcua/app.jar
          startSecs: 8
          stopWaitSecs: 15
      - name: modbus-adapter
        catalogKey: ModbusAdapter
        artifact: { source: { kind: sibling, repo: modbus-adapter } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/packaging-line/modbus-adapter.json
        messaging: { clientId: pack-modbus, type: mqtt, file: modbus-messaging.json }
        launch:
          order: 30
          waitFor: ["localhost:1883"]
          settleSeconds: 6
          exec: /opt/pyenv/bin/python /app/modbus/main.py
          workingDir: /app/modbus
          startSecs: 5
          stopWaitSecs: 15
      - name: telemetry-processor
        catalogKey: TelemetryProcessor
        artifact:
          source: { kind: sibling, repo: telemetry-processor, features: [standalone, streaming, streaming-file-parquet, scripting-lua] }
        configSource: CONFIG_COMPONENT
        layer: layers/components/packaging-line/telemetry-processor.json
        files:
          - { from: "configs/lua/**", to: /scripts }
        messaging: { clientId: pack-telemetry, file: telemetry-messaging.json }
        launch: { order: 40, waitFor: ["localhost:1883"], settleSeconds: 6, startSecs: 5, stopWaitSecs: 15 }
      - name: uns-bridge
        catalogKey: UnsBridge
        artifact: { source: { kind: sibling, repo: uns-bridge } }
        configSource: CONFIG_COMPONENT
        layer: layers/components/packaging-line/uns-bridge.json
        messaging: { clientId: pack-bridge-local, requestTimeoutSeconds: 30, file: bridge-messaging.json }
        launch: { order: 28, waitFor: ["localhost:1883"], settleSeconds: 3, startSecs: 5, stopWaitSecs: 15 }
