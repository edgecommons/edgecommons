apiVersion: v1
kind: ServiceAccount
metadata:
  name: gw-fill-01-file-replicator
  labels:
    app.kubernetes.io/name: file-replicator
    app.kubernetes.io/instance: gw-fill-01-file-replicator
    app.kubernetes.io/part-of: gw-fill-01
    app.kubernetes.io/managed-by: edgecommons
automountServiceAccountToken: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gw-fill-01-file-replicator
  labels:
    app.kubernetes.io/name: file-replicator
    app.kubernetes.io/instance: gw-fill-01-file-replicator
    app.kubernetes.io/part-of: gw-fill-01
    app.kubernetes.io/managed-by: edgecommons
data:
  config.json: |
    {
      "hierarchy": {
        "levels": [
          "enterprise",
          "site",
          "line",
          "device"
        ]
      },
      "identity": {
        "enterprise": "bottles-r-us",
        "site": "dallas",
        "line": "filling-line"
      },
      "tags": {
        "appId": "bottling-plant",
        "scenario": "bottling-company-test"
      },
      "logging": {
        "level": "INFO",
        "publish": {
          "enabled": true,
          "destination": "local",
          "minLevel": "INFO"
        },
        "rust_format": "{timestamp} [{level}] [{component}] {target} - {message}"
      },
      "heartbeat": {
        "enabled": true,
        "intervalSecs": 10,
        "measures": {
          "cpu": true,
          "memory": true,
          "threads": true,
          "files": true,
          "fds": true
        }
      },
      "metricEmission": {
        "target": "messaging",
        "namespace": "edgecommons"
      },
      "component": {
        "token": "file-replicator",
        "global": {
          "defaults": {
            "retry": {
              "baseDelayMs": 1000,
              "maxDelayMs": 900000,
              "giveUpAfter": "7d"
            }
          },
          "limits": {
            "maxConcurrentFiles": 8
          }
        },
        "instances": [
          {
            "id": "archive-to-replicated",
            "ingress": {
              "path": "/out/archive",
              "recursive": true,
              "include": [
                "**/*.parquet"
              ],
              "exclude": [
                "**/*.inprogress"
              ],
              "readiness": {
                "strategy": "stability",
                "quietSecs": 3
              }
            },
            "egress": [
              {
                "type": "local",
                "path": "/mnt/replicated",
                "fsync": true
              }
            ],
            "schedule": {
              "mode": "immediate"
            },
            "completion": {
              "onSuccess": "archive",
              "archiveDir": "/out/_archived",
              "onExhausted": "retainInPlace",
              "verify": "checksum"
            },
            "limits": {
              "maxConcurrentFiles": 4
            }
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gw-fill-01-file-replicator
  labels:
    app.kubernetes.io/name: file-replicator
    app.kubernetes.io/instance: gw-fill-01-file-replicator
    app.kubernetes.io/part-of: gw-fill-01
    app.kubernetes.io/managed-by: edgecommons
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: file-replicator
      app.kubernetes.io/instance: gw-fill-01-file-replicator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: file-replicator
        app.kubernetes.io/instance: gw-fill-01-file-replicator
        app.kubernetes.io/part-of: gw-fill-01
        app.kubernetes.io/managed-by: edgecommons
    spec:
      serviceAccountName: gw-fill-01-file-replicator
      automountServiceAccountToken: true
      nodeSelector:
        edgecommons.io/gateway: gw-fill-01
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: component
        image: ghcr.io/edgecommons/file-replicator:1.0.0
        args:
        - --platform
        - KUBERNETES
        - -c
        - CONFIGMAP
        - /etc/edgecommons
        - config.json
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: EDGECOMMONS_THING_NAME
          value: gw-fill-01
        ports:
        - name: health
          containerPort: 8081
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/edgecommons
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: gw-fill-01-file-replicator
---
apiVersion: v1
kind: Service
metadata:
  name: gw-fill-01-file-replicator
  labels:
    app.kubernetes.io/name: file-replicator
    app.kubernetes.io/instance: gw-fill-01-file-replicator
    app.kubernetes.io/part-of: gw-fill-01
    app.kubernetes.io/managed-by: edgecommons
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: file-replicator
    app.kubernetes.io/instance: gw-fill-01-file-replicator
  ports:
  - name: health
    port: 8081
    targetPort: health
  - name: metrics
    port: 9090
    targetPort: metrics
