apiVersion: v1
kind: ServiceAccount
metadata:
  name: gw-pack-01-opcua-adapter
  labels:
    app.kubernetes.io/name: opcua-adapter
    app.kubernetes.io/instance: gw-pack-01-opcua-adapter
    app.kubernetes.io/part-of: gw-pack-01
    app.kubernetes.io/managed-by: edgecommons
automountServiceAccountToken: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gw-pack-01-opcua-adapter
  labels:
    app.kubernetes.io/name: opcua-adapter
    app.kubernetes.io/instance: gw-pack-01-opcua-adapter
    app.kubernetes.io/part-of: gw-pack-01
    app.kubernetes.io/managed-by: edgecommons
data:
  config.json: |
    {
      "hierarchy": {
        "levels": [
          "enterprise",
          "site",
          "line",
          "device"
        ]
      },
      "identity": {
        "enterprise": "bottles-r-us",
        "site": "dallas",
        "line": "packaging-line"
      },
      "tags": {
        "appId": "bottling-plant",
        "scenario": "bottling-company-test"
      },
      "logging": {
        "level": "INFO",
        "publish": {
          "enabled": true,
          "destination": "local",
          "minLevel": "INFO"
        }
      },
      "heartbeat": {
        "enabled": true,
        "intervalSecs": 5,
        "measures": {
          "cpu": true,
          "memory": true,
          "threads": true,
          "files": true,
          "fds": true
        }
      },
      "metricEmission": {
        "target": "messaging",
        "targetConfig": {
          "destination": "local"
        }
      },
      "component": {
        "token": "opcua-adapter",
        "global": {
          "defaults": {
            "publishIntervalMs": 500,
            "samplingRateMs": 200,
            "queueSize": 20
          }
        },
        "instances": [
          {
            "id": "palletizer1",
            "connection": {
              "endpoint": "opc.tcp://kepware.dallas.svc.cluster.local:49320",
              "securityPolicy": "None"
            },
            "publish": {
              "batchMs": 0
            },
            "subscriptions": [
              {
                "id": "live",
                "include": [
                  {
                    "namespaceUri": "Kepware Server",
                    "match": "^GGCommonsTest\\.Device1\\.Live.*",
                    "samplingRateMs": 200,
                    "queueSize": 20
                  }
                ],
                "exclude": []
              }
            ]
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gw-pack-01-opcua-adapter
  labels:
    app.kubernetes.io/name: opcua-adapter
    app.kubernetes.io/instance: gw-pack-01-opcua-adapter
    app.kubernetes.io/part-of: gw-pack-01
    app.kubernetes.io/managed-by: edgecommons
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opcua-adapter
      app.kubernetes.io/instance: gw-pack-01-opcua-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opcua-adapter
        app.kubernetes.io/instance: gw-pack-01-opcua-adapter
        app.kubernetes.io/part-of: gw-pack-01
        app.kubernetes.io/managed-by: edgecommons
    spec:
      serviceAccountName: gw-pack-01-opcua-adapter
      automountServiceAccountToken: true
      nodeSelector:
        edgecommons.io/gateway: gw-pack-01
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: component
        image: ghcr.io/edgecommons/opcua-adapter:1.0.0
        args:
        - --platform
        - KUBERNETES
        - -c
        - CONFIGMAP
        - /etc/edgecommons
        - config.json
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: EDGECOMMONS_THING_NAME
          value: gw-pack-01
        ports:
        - name: health
          containerPort: 8081
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/edgecommons
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: gw-pack-01-opcua-adapter
---
apiVersion: v1
kind: Service
metadata:
  name: gw-pack-01-opcua-adapter
  labels:
    app.kubernetes.io/name: opcua-adapter
    app.kubernetes.io/instance: gw-pack-01-opcua-adapter
    app.kubernetes.io/part-of: gw-pack-01
    app.kubernetes.io/managed-by: edgecommons
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opcua-adapter
    app.kubernetes.io/instance: gw-pack-01-opcua-adapter
  ports:
  - name: health
    port: 8081
    targetPort: health
  - name: metrics
    port: 9090
    targetPort: metrics
