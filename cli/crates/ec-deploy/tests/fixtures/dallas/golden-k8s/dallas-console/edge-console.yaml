apiVersion: v1
kind: ServiceAccount
metadata:
  name: dallas-console-edge-console
  labels:
    app.kubernetes.io/name: edge-console
    app.kubernetes.io/instance: dallas-console-edge-console
    app.kubernetes.io/part-of: dallas-console
    app.kubernetes.io/managed-by: edgecommons
automountServiceAccountToken: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dallas-console-edge-console
  labels:
    app.kubernetes.io/name: edge-console
    app.kubernetes.io/instance: dallas-console-edge-console
    app.kubernetes.io/part-of: dallas-console
    app.kubernetes.io/managed-by: edgecommons
data:
  config.json: |
    {
      "hierarchy": {
        "levels": [
          "enterprise",
          "site",
          "device"
        ]
      },
      "identity": {
        "enterprise": "bottles-r-us",
        "site": "dallas"
      },
      "tags": {
        "appId": "bottling-plant",
        "scenario": "bottling-company-test"
      },
      "logging": {
        "level": "INFO",
        "publish": {
          "enabled": true,
          "destination": "local",
          "minLevel": "INFO"
        }
      },
      "heartbeat": {
        "enabled": true,
        "intervalSecs": 5,
        "measures": {
          "cpu": true,
          "memory": true,
          "threads": true,
          "files": true,
          "fds": true
        }
      },
      "metricEmission": {
        "target": "messaging"
      },
      "messaging": {
        "local": {
          "host": "localhost",
          "port": 1883,
          "clientId": "edge-console"
        },
        "requestTimeoutSeconds": 30
      },
      "component": {
        "token": "edge-console",
        "global": {
          "console": {
            "ws": {
              "port": 8443,
              "bindAddress": "0.0.0.0",
              "heartbeatIntervalMs": 15000,
              "webRoot": "/app/edge-console/ui/dist"
            },
            "apps": [
              {
                "id": "dallas-line-1",
                "webRoot": "apps/dallas-operations",
                "allowedOrigins": [
                  "http://127.0.0.1:8080"
                ],
                "allowedRoles": [
                  "operator"
                ],
                "capabilities": [
                  "signals",
                  "alarms"
                ]
              },
              {
                "id": "dallas-line-2",
                "webRoot": "apps/dallas-operations",
                "allowedOrigins": [
                  "http://127.0.0.1:8080"
                ],
                "allowedRoles": [
                  "operator"
                ],
                "capabilities": [
                  "signals",
                  "alarms"
                ]
              },
              {
                "id": "tv-board",
                "webRoot": "apps/tv-board",
                "allowedOrigins": [
                  "http://127.0.0.1:8080",
                  "http://192.168.1.224:8080",
                  "file://",
                  "null",
                  "https://google-tv.edgecommons.local"
                ],
                "allowedRoles": [
                  "operator"
                ],
                "capabilities": [
                  "signals",
                  "alarms"
                ]
              }
            ],
            "staleness": {
              "warnMultiplier": 2,
              "staleMultiplier": 2.5,
              "offlineMultiplier": 5,
              "defaultIntervalSecs": 5,
              "sweepIntervalMs": 1000
            },
            "cache": {
              "maxChannelsPerComponent": 1024
            },
            "runtime": {
              "workerThreads": 4,
              "mallocArenaMax": 2,
              "eventBufferCapacity": 512
            }
          }
        },
        "instances": [
          {
            "id": "main"
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dallas-console-edge-console
  labels:
    app.kubernetes.io/name: edge-console
    app.kubernetes.io/instance: dallas-console-edge-console
    app.kubernetes.io/part-of: dallas-console
    app.kubernetes.io/managed-by: edgecommons
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-console
      app.kubernetes.io/instance: dallas-console-edge-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-console
        app.kubernetes.io/instance: dallas-console-edge-console
        app.kubernetes.io/part-of: dallas-console
        app.kubernetes.io/managed-by: edgecommons
    spec:
      serviceAccountName: dallas-console-edge-console
      automountServiceAccountToken: true
      nodeSelector:
        edgecommons.io/gateway: dallas-console
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: component
        image: ghcr.io/edgecommons/edge-console:1.0.0
        args:
        - --platform
        - KUBERNETES
        - -c
        - CONFIGMAP
        - /etc/edgecommons
        - config.json
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: EDGECOMMONS_THING_NAME
          value: dallas-console
        ports:
        - name: health
          containerPort: 8081
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/edgecommons
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: dallas-console-edge-console
---
apiVersion: v1
kind: Service
metadata:
  name: dallas-console-edge-console
  labels:
    app.kubernetes.io/name: edge-console
    app.kubernetes.io/instance: dallas-console-edge-console
    app.kubernetes.io/part-of: dallas-console
    app.kubernetes.io/managed-by: edgecommons
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: edge-console
    app.kubernetes.io/instance: dallas-console-edge-console
  ports:
  - name: health
    port: 8081
    targetPort: health
  - name: metrics
    port: 9090
    targetPort: metrics
