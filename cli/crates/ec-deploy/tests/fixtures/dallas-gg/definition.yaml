# Dallas filling line as a GREENGRASS site — the Greengrass renderer's golden fixture.
#
# The same hierarchy and component config as the HOST fixture, retargeted: components take
# their configuration through GG_CONFIG (the native Greengrass path every component recipe in
# the org already uses: `-c GG_CONFIG`), and each node maps 1:1 onto a per-thing deployment.
# Artifacts are version+digest pinned, because a Greengrass deployment references a published
# componentVersion — there is no source-form deployment.
apiVersion: edgecommons.io/v1alpha1
kind: DeploymentDefinition
metadata:
  name: dallas-greengrass
  description: >-
    Bottles-R-Us Dallas filling line deployed on AWS IoT Greengrass: two gateways, each its own
    thing and its own deployment document.

hierarchy:
  levels: [enterprise, site, line, device]
  scopes:
    - id: enterprise/bottles-r-us
      parent: null
      layer: layers/scopes/enterprise-bottles-r-us.json
    - id: site/dallas
      parent: enterprise/bottles-r-us
      layer: layers/scopes/site-dallas.json
    - id: line/filling-line
      parent: site/dallas
      layer: layers/scopes/line-filling-line.json

targetStandard:
  family: GREENGRASS
  exceptions: []

environments:
  - name: prod
    protection: protected
    bindings: bindings/prod.json

nodes:
  - key: gw-fill-01
    scope: line/filling-line
    identity:
      thingName: gw-fill-01
    components:
      - name: opcua-adapter
        artifact:
          version: "1.0.0"
          digest: "sha256:9f1c22aa5d3e"
          greengrassName: com.mbreissi.edgecommons.OpcUaAdapter
        configSource: GG_CONFIG
        layer: layers/components/opcua-adapter.json
      - name: telemetry-processor
        artifact:
          version: "1.4.2"
          digest: "sha256:3ab07711cc90"
          greengrassName: com.mbreissi.edgecommons.TelemetryProcessor
        configSource: GG_CONFIG
        layer: layers/components/telemetry-processor.json
      - name: uns-bridge
        artifact:
          version: "1.0.0"
          digest: "sha256:71d4e0b8af12"
          greengrassName: com.mbreissi.edgecommons.UnsBridge
        configSource: GG_CONFIG
        layer: layers/components/uns-bridge.json

  # A second gateway on the same line: same components, its own thing, its own deployment.
  - key: gw-fill-02
    scope: line/filling-line
    identity:
      thingName: gw-fill-02
    components:
      - name: telemetry-processor
        artifact:
          version: "1.4.2"
          digest: "sha256:3ab07711cc90"
          greengrassName: com.mbreissi.edgecommons.TelemetryProcessor
        configSource: GG_CONFIG
        layer: layers/components/telemetry-processor.json
      - name: uns-bridge
        artifact:
          version: "1.0.0"
          digest: "sha256:71d4e0b8af12"
          greengrassName: com.mbreissi.edgecommons.UnsBridge
        configSource: GG_CONFIG
        layer: layers/components/uns-bridge.json
