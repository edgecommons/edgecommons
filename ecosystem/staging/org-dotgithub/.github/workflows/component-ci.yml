# Reusable component CI for the edgecommons ecosystem.
#
# Call from a component repo:
#
#   # .github/workflows/ci.yml
#   name: ci
#   on: [push, pull_request]
#   jobs:
#     ci:
#       uses: edgecommons/.github/.github/workflows/component-ci.yml@main
#       with:
#         language: PYTHON            # JAVA | PYTHON | RUST | TYPESCRIPT
#         working-directory: "."      # optional
#
# Toolchain versions are inputs so a component can pin its own. This is a sensible starting
# template — specialize per component as real CI needs surface (coverage gates, GDK build,
# container publish to ghcr.io/edgecommons/*, etc.).

name: component-ci

on:
  workflow_call:
    inputs:
      language:
        description: "JAVA | PYTHON | RUST | TYPESCRIPT"
        required: true
        type: string
      working-directory:
        description: "Path to the component within the repo"
        required: false
        type: string
        default: "."
      java-version:
        required: false
        type: string
        default: "25"
      python-version:
        required: false
        type: string
        default: "3.12"
      node-version:
        required: false
        type: string
        default: "20"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      # ----- JAVA -----
      # setup-java writes ~/.m2/settings.xml with a <server id="github"> so Maven can resolve the
      # private com.mbreissi:ggcommons from GitHub Packages. The consuming repo's GITHUB_TOKEN must
      # be granted read access to the edgecommons/ggcommons package (Package settings -> Manage
      # Actions access) for cross-repo resolution to succeed.
      - if: inputs.language == 'JAVA'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - if: inputs.language == 'JAVA'
        run: mvn -B verify
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # ----- PYTHON -----
      - if: inputs.language == 'PYTHON'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      # Components that depend on the private ggcommons via a git URL
      # (greengrass-commons @ git+https://github.com/edgecommons/ggcommons.git@<tag>...)
      # need a token to clone it. The org GITHUB_TOKEN is repo-scoped and cannot read
      # another private repo, so provide a read-only PAT as the org/repo Actions secret
      # GGCOMMONS_READ_TOKEN. No token -> step is a no-op (fine for public-dep components).
      - if: inputs.language == 'PYTHON'
        name: Configure private git auth for ggcommons (if a token is provided)
        env:
          GGCOMMONS_READ_TOKEN: ${{ secrets.GGCOMMONS_READ_TOKEN }}
        run: |
          if [ -n "$GGCOMMONS_READ_TOKEN" ]; then
            git config --global url."https://x-access-token:${GGCOMMONS_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
            echo "configured private git auth for github.com"
          else
            echo "GGCOMMONS_READ_TOKEN not set; private git-dep installs may fail"
          fi
      - if: inputs.language == 'PYTHON'
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-test.txt
          python -m pytest

      # ----- RUST -----
      - if: inputs.language == 'RUST'
        uses: dtolnay/rust-toolchain@stable
      - if: inputs.language == 'RUST'
        run: |
          cargo build --all-targets
          cargo test
          cargo clippy --all-targets -- -D warnings

      # ----- TYPESCRIPT -----
      - if: inputs.language == 'TYPESCRIPT'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - if: inputs.language == 'TYPESCRIPT'
        run: |
          npm ci
          npm run build
          npm test

      - if: ${{ !contains(fromJSON('["JAVA","PYTHON","RUST","TYPESCRIPT"]'), inputs.language) }}
        run: |
          echo "::error::unknown language input '${{ inputs.language }}' (expected JAVA|PYTHON|RUST|TYPESCRIPT)"
          exit 1
