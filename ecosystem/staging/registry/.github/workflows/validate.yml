name: validate-registry

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - components.json
      - registry.schema.json
      - .github/workflows/validate.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator
        run: python -m pip install --upgrade check-jsonschema
      - name: Validate components.json against the schema
        run: check-jsonschema --schemafile registry.schema.json components.json
