syntax = "proto3";

package edgecommons.v1;

option java_multiple_files = true;
option java_package = "com.mbreissi.edgecommons.proto.v1";

import "edgecommons/v1/value.proto";

message EventMessage {
  string severity = 1;
  string type = 2;
  optional string message = 3;
  string timestamp = 4;
  optional uint64 timestamp_ms = 5;
  EcValue context = 6;
  optional bool alarm = 7;
  optional bool active = 8;
  map<string, EcValue> extra = 100;
}
