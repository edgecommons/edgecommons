---
RecipeFormatVersion: "2020-01-25"
ComponentName: "<<COMPONENTFULLNAME>>"
ComponentVersion: "1.0.0"
ComponentDescription: "<<DESCRIPTION>>"
ComponentPublisher: "<<AUTHOR>>"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        # Per-language log format (token template): {timestamp} {level} {logger} {message}.
        ts_format: "{timestamp} [{level}] {logger}: {message}"
      heartbeat:
        enabled: true
        intervalSecs: 5
        # The state keepalive publishes to ecv1/{device}/{component}/main/state; the
        # measures are emitted as the 'sys' metric through metricEmission.
        destination: "local"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "edgecommons"
        # Component work dir — writable by a non-root (ggc_user) component.
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      # UNS identity: an ordered hierarchy whose LAST level is always the resolved thing
      # name; every other level's value comes from `identity`. Topics built by gg.uns()
      # carry {device}/{component}/{instance} under the ecv1 root (rootless by default).
      hierarchy:
        levels: ["site", "device"]
      identity:
        site: "Chantilly"
      tags:
        appId: "Test"
        site: "Chantilly"
      component:
        global:
          publish_interval: 3
        instances:
        - id: main
    accessControl:
      aws.greengrass.ipc.pubsub:
        "<<COMPONENTFULLNAME>>:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all local topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "<<COMPONENTFULLNAME>>:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "<<COMPONENTFULLNAME>>:shadow:1":
          policyDescription: Allows access to thing shadows.
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/<<COMPONENTNAME>>.zip"
        Unarchive: ZIP
    Lifecycle:
      # The ZIP bundles dist/, node_modules/ and package.json, so the component runs
      # the prebuilt JS directly (no install step on-device). Runs on the GREENGRASS
      # platform (IPC transport), reading config from the deployment (GG_CONFIG), as the default component
      # user (ggc_user) — no elevated privilege needed. Add RequiresPrivilege only if truly required.
      Run:
        Script: "node {artifacts:decompressedPath}/<<COMPONENTNAME>>/dist/main.js --platform GREENGRASS -c GG_CONFIG"
