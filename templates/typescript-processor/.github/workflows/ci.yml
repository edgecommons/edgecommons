name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo.
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: TYPESCRIPT
    secrets: inherit

  coverage:
    # The 90%-line coverage gate (org rule: 90% line coverage in all four languages, live-infra
    # paths excluded, never lowered to pass) — actually RUN here, since the reusable component-ci
    # only builds/tests. Thresholds are enforced by vitest itself (see vitest.config.ts); this job
    # just runs it and fails the build if they are not met.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Coverage gate (90% lines — thresholds in vitest.config.ts)
        run: npm run coverage
