name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo. `secrets: inherit` passes the org-level
    # EDGECOMMONS_READ_TOKEN so cargo can fetch the private edgecommons git dependency (only needed
    # for a `registry`/`pinned-rev` --dep-source; harmless if unused). The repo must be added to
    # that secret's repository allow-list (org Actions secrets, via the REST API).
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
    secrets: inherit

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      # Org rule: 90% line coverage in all four languages; live-infra-only paths are validated
      # through lab/HOST smoke instead of being forced into unit coverage. Do NOT lower this gate
      # or exclude testable code to pass it — add tests.
      #
      # The `ethernet-ip-adapter` discipline (its ci.yml): the untestable live-driver code is kept in
      # a dedicated, as-thin-as-possible seam file so a file-level exclusion removes ONLY code that
      # needs a live messaging transport + a live destination and never launders out tested logic.
      # Every pure decision the drivers compose — the retry backoff, the give-up budget, the stable
      # delivery key, per-destination connectivity, the config defaults, and the destination contract
      # (`src/dest.rs`) — stays in `app.rs` / `dest.rs`, in the denominator, and IS unit-tested.
      # Excluded, each pinned to a reason:
      #   - `src/supervisor.rs` — the consume → deliver/verify → retry drivers (`App::new`/`run`,
      #     `run_sink`, `deliver_with_retry`): they `.await` a live broker subscription, the bounded
      #     queue, and the destination's live `deliver`/`verify`.
      #   - `src/main.rs` — the binary bootstrap shim (build the runtime, hand off to `supervisor::App`).
      # These are validated by HOST / full-system smoke and the scaffold→build gate. NOTHING ELSE is
      # excluded.
      - run: >
          cargo llvm-cov --fail-under-lines 90
          --ignore-filename-regex '(supervisor\.rs|main\.rs)'
