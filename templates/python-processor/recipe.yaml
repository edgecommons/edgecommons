RecipeFormatVersion: '2020-01-25'
ComponentName: <<COMPONENTFULLNAME>>
ComponentVersion: 1.0.0
ComponentDescription: <<DESCRIPTION>>
ComponentPublisher: <<AUTHOR>>
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: '>=2.0.0'
    DependencyType: HARD
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: INFO
        python_format: '%(asctime)s [%(levelname)s] %(filename)s %(funcName)s(%(lineno)d) [%(threadName)s]:
          %(message)s'
      heartbeat:
        enabled: true
        intervalSecs: 5
        destination: local
        measures:
          cpu: true
          memory: true
          disk: false
      tags: {}
      metricEmission:
        target: cloudwatch
        namespace: edgecommons
        targetConfig:
          intervalSecs: 10
      component:
        global:
          defaults:
            tickMs: 10000
            maxQueue: 256
        instances:
        - id: rollup
          subscribe:
          - ecv1/+/+/+/data/#
          publishTopic: ecv1/gw-01/<<BINNAME>>/rollup/data/summary
          target: local
          pipeline:
          - fieldEquals:
              path: signal.id
              value: temperature-1
          - countPerTick: {}
          tickMs: 10000
    accessControl:
      aws.greengrass.ipc.pubsub:
        <<COMPONENTFULLNAME>>:ipc:1:
          policyDescription: Allows access to publish/subscribe to all topics on IPC
          operations:
          - aws.greengrass#PublishToTopic
          - aws.greengrass#SubscribeToTopic
          resources:
          - '*'
      aws.greengrass.ipc.mqttproxy:
        <<COMPONENTFULLNAME>>:iotcore:1:
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
          - aws.greengrass#PublishToIoTCore
          - aws.greengrass#SubscribeToIoTCore
          resources:
          - '*'
      aws.greengrass.ShadowManager:
        <<COMPONENTFULLNAME>>:shadow:1:
          policyDescription: Allows access to shadows.
          operations:
          - aws.greengrass#GetThingShadow
          - aws.greengrass#UpdateThingShadow
          - aws.greengrass#DeleteThingShadow
          resources:
          - '*'
Manifests:
- Platform:
    os: all
  Artifacts:
  - URI: s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/<<COMPONENTNAME>>.zip
    Unarchive: ZIP
  Lifecycle:
    install:
      Script: 'set -e

        COMPONENT_DIR="{work:path}"

        python3 -m venv "$COMPONENT_DIR/venv"

        . $COMPONENT_DIR/venv/bin/activate

        pip3 install --upgrade pip

        pip3 install -r {artifacts:decompressedPath}/<<COMPONENTNAME>>/requirements.txt

        deactivate'
    Run:
      Script: 'set -e

        COMPONENT_DIR="{work:path}"

        . $COMPONENT_DIR/venv/bin/activate

        python3 -u {artifacts:decompressedPath}/<<COMPONENTNAME>>/main.py --platform GREENGRASS'
