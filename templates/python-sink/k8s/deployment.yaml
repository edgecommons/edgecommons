# Minimal Kubernetes Deployment for a edgecommons component. With --platform auto the library detects
# KUBERNETES from the ServiceAccount token; config source defaults to CONFIGMAP, transport to MQTT
# (broker config from the mounted ConfigMap), identity from the Downward API — so NO args are needed.
# Build the image from ./Dockerfile and push to your registry (e.g. ghcr.io/<owner>/<<BINNAME>>)
# or `kind load` it for a local cluster, then set `image:` below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <<BINNAME>>
  labels:
    app.kubernetes.io/name: <<BINNAME>>
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: <<BINNAME>>
  template:
    metadata:
      labels:
        app.kubernetes.io/name: <<BINNAME>>
    spec:
      automountServiceAccountToken: true   # the projected SA token is the platform=KUBERNETES auto-detect signal
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
      containers:
        - name: component
          image: REPLACE_ME   # e.g. ghcr.io/<owner>/<<BINNAME>>:latest (build ./Dockerfile)
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          ports:
            - { name: health, containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          startupProbe:
            httpGet: { path: /startupz, port: health }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: health }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/edgecommons, readOnly: true }   # WHOLE volume, never subPath (hot-reload)
            - { name: tmp, mountPath: /tmp }
            # The `local` destination root (see k8s/configmap.yaml). readOnlyRootFilesystem: true is
            # kept — a sink writes to its destination, and nowhere else.
            - { name: out, mountPath: /data }
      volumes:
        - name: config
          configMap: { name: <<BINNAME>>-config }
        - name: tmp
          emptyDir: {}
        # An emptyDir dies with the pod: fine for a scaffold, WRONG for a sink you rely on. Point
        # this at a PersistentVolumeClaim (or a destination that is not this pod's disk) before you
        # trust it with data — a sink is the last thing standing between data and its destination.
        - name: out
          emptyDir: {}
