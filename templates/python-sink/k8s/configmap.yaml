# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons so the CONFIGMAP
# source watches the kubelet ..data swap and hot-reloads in-process (no restart). config.json
# carries BOTH the component config AND the messaging block (in-cluster broker via Service DNS).
# Edit this and `kubectl apply -f k8s/` to drive a hot reload. Point host at your broker Service.
#
# A sink with no instances has nothing to deliver and refuses to start — deliberately: a sink that
# silently does nothing is worse. So one working sink is declared below, delivering into the writable
# emptyDir the Deployment mounts at /data.
apiVersion: v1
kind: ConfigMap
metadata:
  name: <<COMPONENTNAME>>-config
  labels:
    app.kubernetes.io/name: <<COMPONENTNAME>>
data:
  config.json: |-
    {
      "hierarchy": {
        "levels": [
          "site",
          "device"
        ]
      },
      "identity": {
        "site": "site1"
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "emqx.default.svc.cluster.local",
          "port": 1883,
          "clientId": "<<COMPONENTNAME>>"
        }
      },
      "logging": {
        "level": "INFO"
      },
      "metricEmission": {
        "target": "log",
        "namespace": "edgecommons"
      },
      "component": {
        "global": {
          "defaults": {
            "retry": {
              "baseDelayMs": 1000,
              "giveUpAfterMs": 3600000
            },
            "maxQueue": 256
          }
        },
        "instances": [
          {
            "id": "archive",
            "subscribe": "ecv1/+/+/+/data/#",
            "destination": {
              "type": "local",
              "path": "./out"
            },
            "retry": {
              "baseDelayMs": 1000,
              "maxDelayMs": 900000,
              "giveUpAfterMs": 3600000
            }
          }
        ]
      }
    }
