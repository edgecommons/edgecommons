# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons (CONFIGMAP source watches
# the ..data swap and hot-reloads). Carries the component config + the in-cluster broker. Add your
# device instances under component.instances[]; `kubectl apply -f k8s/` to hot-reload.
apiVersion: v1
kind: ConfigMap
metadata:
  name: <<BINNAME>>-config
  labels:
    app.kubernetes.io/name: <<BINNAME>>
data:
  config.json: |-
    {
      "logging": {
        "level": "INFO"
      },
      "hierarchy": {
        "levels": [
          "site",
          "device"
        ]
      },
      "identity": {
        "site": "site1"
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "emqx.default.svc.cluster.local",
          "port": 1883,
          "clientId": "<<BINNAME>>"
        }
      },
      "component": {
        "global": {
          "defaults": {
            "pollIntervalMs": 1000
          },
          "healthThresholds": {
            "staleSignalSecs": 30
          }
        },
        "instances": [
          {
            "id": "device1",
            "adapter": "sim",
            "connection": {
              "endpoint": "sim://device1"
            },
            "pollIntervalMs": 1000,
            "writes": {
              "allow": []
            }
          }
        ]
      }
    }
