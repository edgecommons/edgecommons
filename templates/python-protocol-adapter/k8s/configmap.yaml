# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons (CONFIGMAP source watches
# the ..data swap and hot-reloads). Carries the component config + the in-cluster broker. Add your
# device instances under component.instances[]; `kubectl apply -f k8s/` to hot-reload.
apiVersion: v1
kind: ConfigMap
metadata:
  name: <<COMPONENTNAME>>-config
  labels:
    app.kubernetes.io/name: <<COMPONENTNAME>>
data:
  config.json: |-
    {
      "logging": {
        "level": "INFO"
      },
      "hierarchy": {
        "levels": [
          "site",
          "device"
        ]
      },
      "identity": {
        "site": "site1"
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "emqx.default.svc.cluster.local",
          "port": 1883,
          "clientId": "<<COMPONENTNAME>>"
        }
      },
      "component": {
        "global": {
          "defaults": {
            "pollIntervalMs": 1000
          }
        },
        "instances": [
          {
            "id": "device1",
            "adapter": "example",
            "connection": {
              "_comment": "TODO: your protocol endpoint, e.g. host/port/unitId or an OPC UA endpoint"
            },
            "publish": {
              "_comment": "data topics are minted in code via gg.instance(id).uns() \u2014 ecv1/{device}/{component}/{instance}/data/{signalPath}",
              "batchMs": 0
            },
            "write": {
              "enabled": true,
              "topic": "southbound/{ComponentName}/{InstanceId}/write",
              "_comment": "moves to the UNS cmd/sb/* inbox in Phase 5 (M9)"
            },
            "read": {
              "topic": "southbound/{ComponentName}/{InstanceId}/read",
              "_comment": "moves to the UNS cmd/sb/* inbox in Phase 5 (M9)"
            }
          }
        ]
      }
    }
