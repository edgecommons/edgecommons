---
RecipeFormatVersion: "2020-01-25"
ComponentName: "<<COMPONENTFULLNAME>>"
ComponentVersion: "1.0.0"
ComponentDescription: "<<DESCRIPTION>>"
ComponentPublisher: "<<AUTHOR>>"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        python_format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
      heartbeat:
        intervalSecs: 5
        targets:
          - type: "messaging"
            config:
              destination: "ipc"
              topic: "heartbeat/{ThingName}/{ComponentName}"
        measures: { cpu: true, memory: true, disk: false }
      tags: {}
      metricEmission:
        target: "log"
        targetConfig:
          logFileName: "/greengrass/v2/logs/{ComponentFullName}.metric.log"
      component:
        global:
          defaults: { pollIntervalMs: 1000 }
        instances: []   # add one entry per device (see test-configs/ for the shape)
    accessControl:
      aws.greengrass.ipc.pubsub:
        "<<COMPONENTFULLNAME>>:ipc:1":
          policyDescription: Allows publish/subscribe on all IPC topics
          operations: ["aws.greengrass#PublishToTopic", "aws.greengrass#SubscribeToTopic"]
          resources: ["*"]
      aws.greengrass.ipc.mqttproxy:
        "<<COMPONENTFULLNAME>>:iotcore:1":
          policyDescription: Allows publish/subscribe on all IoT Core topics
          operations: ["aws.greengrass#PublishToIoTCore", "aws.greengrass#SubscribeToIoTCore"]
          resources: ["*"]
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/<<COMPONENTNAME>>.zip"
        Unarchive: ZIP
    Lifecycle:
      install:
        Script: |-
          set -e
          COMPONENT_DIR="{work:path}"
          python3 -m venv "$COMPONENT_DIR/venv"
          . $COMPONENT_DIR/venv/bin/activate
          pip3 install --upgrade pip
          # Bundled ggcommons wheel first (not on public PyPI), then the rest.
          pip3 install {artifacts:decompressedPath}/<<COMPONENTNAME>>/greengrass_commons-*.whl
          pip3 install -r {artifacts:decompressedPath}/<<COMPONENTNAME>>/requirements.txt
          deactivate
      Run:
        Script: |-
          set -e
          COMPONENT_DIR="{work:path}"
          . $COMPONENT_DIR/venv/bin/activate
          python3 -u {artifacts:decompressedPath}/<<COMPONENTNAME>>/main.py --platform GREENGRASS
