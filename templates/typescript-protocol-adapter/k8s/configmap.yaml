# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons so the CONFIGMAP
# source watches the kubelet ..data swap and hot-reloads in-process (no restart). config.json
# carries BOTH the component config AND the messaging block (in-cluster broker via Service DNS).
# Edit this and `kubectl apply -f k8s/` to drive a hot reload. Point host at your broker Service.
#
# `component` is the component-config subtree (`{global, instances}`), and `instances[]` is ONE
# DEVICE PER ENTRY (see config.schema.json). The default is the `sim` backend, so the pod comes up
# and publishes with no hardware attached; point `connection` at a real device and set `adapter` to
# your backend's kind. `writes.allow` is EMPTY on purpose — an adapter is read-only until a signal
# is explicitly allow-listed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: <<BINNAME>>-config
  labels:
    app.kubernetes.io/name: <<BINNAME>>
data:
  config.json: |-
    {
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "emqx.default.svc.cluster.local",
          "port": 1883,
          "clientId": "<<BINNAME>>"
        }
      },
      "logging": {
        "level": "INFO"
      },
      "component": {
        "global": {
          "defaults": {
            "pollIntervalMs": 5000
          },
          "timeouts": {
            "connectMs": 5000,
            "reconnectBackoffMinMs": 1000,
            "reconnectBackoffMaxMs": 60000
          },
          "healthThresholds": {
            "staleSignalSecs": 30
          }
        },
        "instances": [
          {
            "id": "device-1",
            "adapter": "sim",
            "connection": {
              "endpoint": "sim://device-1"
            },
            "pollIntervalMs": 5000,
            "writes": {
              "allow": []
            }
          }
        ]
      }
    }
