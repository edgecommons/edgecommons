apiVersion: v2
name: ggcommons-component
description: >-
  Test-harness Helm chart for a ggcommons component on Kubernetes (Phase 1a).
  Renders a Deployment that runs the component on the KUBERNETES platform
  (auto-detected from the projected ServiceAccount token), with its component
  config supplied by a ConfigMap mounted as a DIRECTORY at /etc/ggcommons so the
  new CONFIGMAP config source + hot-reload works. Liveness/readiness probes are
  PLACEHOLDERS — the real HTTP /livez,/readyz endpoint is sub-phase 1c.
type: application
# Chart version; bump on chart changes.
version: 0.1.0
# The ggcommons library/component generation this harness targets.
appVersion: "0.1.0"
keywords:
  - ggcommons
  - greengrass
  - kubernetes
  - configmap
  - edge
home: https://github.com/breis/ggcommons-monorepo
sources:
  - https://github.com/breis/ggcommons-monorepo
maintainers:
  - name: ggcommons
