# Default values for the ggcommons-component test-harness chart (Phase 1a).
# See test-infra/k8s/README.md for the end-to-end run + the ConfigMap hot-reload test.

# -- Number of pod replicas. Keep at 1 for the hot-reload smoke test (a durable
# streaming buffer would require a StatefulSet + per-pod PVC — out of scope for 1a).
replicas: 1

image:
  # -- Component image. The CI workflow builds this and `kind load`s it into the cluster.
  repository: ggcommons-component
  tag: ci
  # Use IfNotPresent so a `kind load`-ed local image is never re-pulled from a registry.
  pullPolicy: IfNotPresent

# -- Container entrypoint override. Leave empty to use the image's ENTRYPOINT.
# The image is language-specific (java -jar … / python3 main.py / the rust binary /
# node dist/…); set this if the image has no baked-in entrypoint.
command: []

# -- Component args. Platform would also auto-detect to KUBERNETES (from the projected
# ServiceAccount token); we pass it explicitly for clarity. The KUBERNETES profile derives
# transport=MQTT, so --transport is omitted. Phase 1b (FR-MSG-1): with the CONFIGMAP source +
# MQTT, the messaging-config path now DEFAULTS to the mounted ConfigMap file (mountDir/key) — no
# positional `--transport MQTT <path>` is needed. config.json carries an injected `messaging.local`
# block (see configmap.yaml) pointing at the in-cluster broker, so it doubles as the messaging-config
# file. No -t/--thing is passed, so identity comes from the Downward-API env (FR-RT-7): POD_NAME
# (or GGCOMMONS_THING_NAME if `thingName` is set below).
#   -c CONFIGMAP <mountDir> <key>
args:
  - "--platform"
  - "KUBERNETES"
  - "-c"
  - "CONFIGMAP"
  - "/etc/ggcommons"
  - "config.json"

# -- Component identity (thing name). When set, the chart exposes it as the GGCOMMONS_THING_NAME
# Downward-API env var (the highest of the KUBERNETES identity tier; conceptually the
# `ggcommons.io/thing-name` annotation). Leave empty to let identity fall through to POD_NAME
# (the pod's metadata.name) — which is what the smoke test asserts (FR-RT-7).
thingName: ""

# -- Extra environment variables appended verbatim to the container (e.g. additional
# Downward-API fieldRefs or AWS_REGION). Each item is a standard corev1.EnvVar.
extraEnv: []

# -- Encrypted credentials vault using the `env` KeyProvider (Phase 1d). When enabled, the chart creates
# a Secret holding a base64 32-byte KEK, projects it as GGCOMMONS_VAULT_KEK, and injects a `credentials`
# section (vault under the writable /tmp; keyProvider omitted -> the KUBERNETES profile default `env`).
# OFF by default. The smoke enables it to prove the env KeyProvider unlocks a vault on a real pod. In
# production the operator owns the Secret (ESO / sealed-secrets); kekBase64 here is a FIXED TEST key.
credentials:
  enabled: false
  vaultPath: /tmp/ggcommons-vault
  kekBase64: "BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc="

# -- Directory the ConfigMap volume is mounted at. MUST match the CONFIGMAP source
# mount dir above. Mounted as a WHOLE VOLUME (never subPath) so the kubelet's atomic
# ..data symlink swap drives hot-reload (DESIGN-subsystems §1, FR-CFG-2/3).
configMountPath: /etc/ggcommons

# Messaging / broker wiring. The component config points local MQTT at the in-cluster
# EMQX broker by Service DNS (test-infra/k8s/emqx.yaml). Within the same namespace the
# short Service name resolves; the FQDN form is ggcommons-emqx.<ns>.svc.cluster.local.
messaging:
  brokerHost: ggcommons-emqx
  brokerPort: 1883
  clientId: ggcommons-k8s-smoke

# The rendered ggcommons component config (config.json) placed in the ConfigMap.
# A minimal VALID config: a log metric target, a heartbeat, and an MQTT messaging
# config pointing at the in-cluster broker. `component` is the only schema-required key.
config:
  logging:
    level: INFO
  heartbeat:
    intervalSecs: 5
    targets:
      - type: metric
    measures:
      cpu: true
      memory: true
      disk: false
      files: false
      threads: true
      fds: false
  # No explicit `target`: on the KUBERNETES platform the metric target DEFAULTS to `prometheus`
  # (Phase 1c) — an in-process registry served as OpenMetrics text at :9090/metrics. So the heartbeat
  # (routed via `heartbeat.targets: [{type: metric}]`) and any app metrics are SCRAPED, not pushed.
  # gauge name = sanitize(lower("{namespace}_{measure}")), so e.g. heartbeat memory -> ggcommons_memory_usage.
  metricEmission:
    namespace: ggcommons
  # Free-form business config; `component` is required by the schema.
  component:
    global:
      publish_interval: 5
    instances: []

serviceAccount:
  # -- Create a dedicated ServiceAccount. Its projected token is what makes the
  # component auto-detect platform=KUBERNETES, so keep automount on.
  create: true
  name: ""
  # IRSA role-arn annotation goes here when AWS cooperation is wired (Phase 1b+).
  annotations: {}

rbac:
  # -- Minimal namespaced RBAC. The default component needs NO Kubernetes API access
  # (config + secrets arrive as mounted volumes), so this is OFF by default
  # (DESIGN-packaging §6). Enable to grant read-only get/list/watch scoped to the
  # named ConfigMap only — least privilege, never cluster-wide.
  create: false

service:
  # -- A ClusterIP Service exposing the health (/livez,/readyz) and metrics (/metrics) ports,
  # both served by the component as of Phase 1c.
  enabled: true
  type: ClusterIP
  healthPort: 8081
  metricsPort: 9090

# -- Optional Prometheus Operator ServiceMonitor wiring the scrape of the `metrics` port.
# OFF by default (it requires the Prometheus Operator CRD; the smoke validates /metrics by a
# direct GET instead). Enable on a cluster that runs the Prometheus Operator. Central, multi-site
# aggregation is then the collector's outbound remote_write to AMP/Mimir/Thanos/Grafana Cloud —
# edge-initiated egress, never cloud->edge inbound (see test-infra/k8s/README.md + DESIGN-subsystems §3).
serviceMonitor:
  enabled: false
  # /metrics path (matches the component's prometheus targetConfig.path default).
  path: /metrics
  # Scrape interval/timeout for the metrics endpoint (the SCRAPER owns the cadence, not the component).
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels (e.g. `release: kube-prometheus-stack`) so the operator selects this monitor.
  labels: {}

# Real HTTP probes against the component's health server (Phase 1c-health). The component
# listens on `service.healthPort` (the `health` container port) and serves /livez, /readyz,
# /startupz. The pod reaching Ready proves /readyz returned 200.
probes:
  enabled: true
  livenessPath: /livez
  readinessPath: /readyz
  startupPath: /startupz
  # Startup gates slow connects: up to failureThreshold*periodSeconds before liveness/readiness apply.
  startup:
    periodSeconds: 3
    failureThreshold: 30
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: "1"
    memory: 256Mi

# Run non-root with a read-only root FS where possible; /tmp is writable via an
# emptyDir for the log-target file above.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Time for SIGTERM-driven graceful shutdown (unsubscribe-before-exit). The real
# SIGTERM wiring is sub-phase 1c; the budget is harmless now.
terminationGracePeriodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
