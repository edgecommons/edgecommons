{{- if .Values.credentials.enabled -}}
{{/*
The vault KEK Secret for the `env` KeyProvider (Phase 1d). Holds the base64-encoded 32-byte KEK as the
value of the EDGECOMMONS_VAULT_KEK key; the deployment projects it into that env var, and the component's
env KeyProvider base64-decodes it to unlock the vault — offline, no cloud. In production the operator owns
this Secret (External Secrets Operator / sealed-secrets / SOPS); the chart default is a FIXED TEST key,
suitable only for the smoke. stringData is stored base64 by k8s and surfaces as the plain base64-KEK string.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "edgecommons.fullname" . }}-vault-kek
  labels:
    {{- include "edgecommons.labels" . | nindent 4 }}
type: Opaque
stringData:
  EDGECOMMONS_VAULT_KEK: {{ .Values.credentials.kekBase64 | quote }}
{{- end -}}
