apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ggcommons.fullname" . }}
  labels:
    {{- include "ggcommons.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "ggcommons.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ggcommons.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{/*
        NOTE: intentionally NO ConfigMap checksum annotation. The whole point of the
        CONFIGMAP source is IN-PROCESS hot-reload across the kubelet ..data swap — we
        do NOT want a config edit to roll the pod. The smoke test edits the ConfigMap
        with `kubectl patch` (not `helm upgrade`) and asserts the running pod reloads.
      */}}
    spec:
      serviceAccountName: {{ include "ggcommons.serviceAccountName" . }}
      # Keep the projected SA token mounted — it is the platform=KUBERNETES auto-detect signal.
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: component
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            # Downward-API identity (FR-RT-7 / FR-CFG-6). The library's KUBERNETES identity tier
            # reads GGCOMMONS_THING_NAME (set from .Values.thingName below, conceptually the
            # `ggcommons.io/thing-name` annotation) then POD_NAME (metadata.name). POD_NAMESPACE /
            # NODE_NAME are provided for general use. fieldRef cannot read annotations into env, so
            # the thing-name annotation is surfaced as an explicit value here.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.thingName }}
            - name: GGCOMMONS_THING_NAME
              value: {{ .Values.thingName | quote }}
            {{- end }}
            {{- if .Values.credentials.enabled }}
            # The vault KEK for the `env` KeyProvider (Phase 1d), from the mounted Secret. The component
            # base64-decodes it to unlock the encrypted vault offline (no cloud).
            - name: GGCOMMONS_VAULT_KEK
              valueFrom:
                secretKeyRef:
                  name: {{ include "ggcommons.fullname" . }}-vault-kek
                  key: GGCOMMONS_VAULT_KEK
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            # Placeholder ports for sub-phase 1c (health endpoint + prometheus target).
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          {{- if .Values.probes.enabled }}
          # Real HTTP probes against the component's health server (Phase 1c-health):
          #   /livez  — process alive; never checks the broker (a broker outage must not restart the pod)
          #   /readyz — 200 only when messaging is connected and the component is ready; 503 on startup/shutdown
          #   /startupz — startup gate for slow connects (generous failureThreshold), then liveness/readiness take over
          # The pod reaching Ready therefore PROVES /readyz returned 200.
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startupPath }}
              port: health
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: health
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: health
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # WHOLE volume, never subPath — subPath mounts never receive the kubelet
            # ..data swap, so hot-reload would be silently dead (FR-CFG-3).
            - name: ggcommons-config
              mountPath: {{ .Values.configMountPath }}
              readOnly: true
            # Writable scratch for the log metric target (read-only root FS).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ggcommons-config
          configMap:
            name: {{ include "ggcommons.configMapName" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
