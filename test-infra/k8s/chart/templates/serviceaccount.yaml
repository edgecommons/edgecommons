{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ggcommons.serviceAccountName" . }}
  labels:
    {{- include "ggcommons.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Token IS automounted (the default): its projected token at
# /var/run/secrets/kubernetes.io/serviceaccount/token is the definitive signal the
# resolver uses to auto-detect platform=KUBERNETES (DESIGN-core §5).
automountServiceAccountToken: true
{{- end -}}
