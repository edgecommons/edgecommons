{{- if .Values.service.enabled -}}
{{/*
ClusterIP Service exposing the component's health (/livez,/readyz on `health`) and prometheus
(/metrics on `metrics`) listeners — both live as of Phase 1c. The `metrics` port is the
ServiceMonitor scrape target (templates/servicemonitor.yaml, opt-in).
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ggcommons.fullname" . }}
  labels:
    {{- include "ggcommons.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ggcommons.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end -}}
