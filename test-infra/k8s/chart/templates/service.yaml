{{- if .Values.service.enabled -}}
{{/*
PLACEHOLDER Service. In 1a the component does not yet open the health (/livez,
/readyz — sub-phase 1c) or prometheus /metrics (sub-phase 1c) listeners, so this
Service has no live endpoints yet. It is shipped now so the wiring (ports, selector,
the future ServiceMonitor target) renders and lints; remove the comment once 1c lands.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ggcommons.fullname" . }}
  labels:
    {{- include "ggcommons.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ggcommons.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end -}}
