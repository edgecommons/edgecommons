apiVersion: batch/v1
kind: Job
metadata:
  name: edgecommons-hierarchical-verifier
  labels:
    app.kubernetes.io/name: edgecommons-hierarchical-verifier
    app.kubernetes.io/part-of: edgecommons-hierarchical-config
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgecommons-hierarchical-verifier
        app.kubernetes.io/part-of: edgecommons-hierarchical-config
    spec:
      restartPolicy: Never
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: verifier
          image: edgecommons-hierarchical-verifier:hierarchical-ci
          imagePullPolicy: IfNotPresent
          env:
            - name: EDGECOMMONS_TEST_DEVICE
              value: edgecommons-k8s-line-7
            - name: EDGECOMMONS_IT_MQTT_HOST
              value: edgecommons-emqx
            - name: EDGECOMMONS_IT_MQTT_PORT
              value: "1883"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          volumeMounts:
            - name: update-catalog
              mountPath: /etc/edgecommons
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: update-catalog
          configMap:
            name: edgecommons-hierarchical-update-catalog
            items:
              - key: updated-catalog.json
                path: updated-catalog.json
        - name: tmp
          emptyDir: {}
