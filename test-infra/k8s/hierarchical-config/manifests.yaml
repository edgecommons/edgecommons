apiVersion: v1
kind: ConfigMap
metadata:
  name: edgecommons-config-component-config
data:
  config.json: |-
    {
      "logging": {
        "level": "INFO"
      },
      "heartbeat": {
        "enabled": true,
        "intervalSecs": 5,
        "destination": "local",
        "measures": {
          "cpu": false,
          "memory": false,
          "disk": false,
          "files": false,
          "threads": false,
          "fds": false
        }
      },
      "metricEmission": {
        "namespace": "edgecommons_hierarchical"
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "edgecommons-emqx",
          "port": 1883,
          "clientId": "edgecommons-config-component"
        }
      },
      "component": {
        "token": "edgecommons-config-component",
        "global": {
          "configComponent": {
            "catalogSource": {
              "type": "configmap",
              "mountDir": "/etc/edgecommons/config",
              "key": "catalog.json",
              "watch": true
            },
            "pushOnCatalogReload": true,
            "allowVolatileCatalogUpdates": true
          }
        },
        "instances": []
      }
    }
  catalog.json: |-
    {
      "schemaVersion": 1,
      "version": "k8s-hierarchical-initial",
      "provenance": {
        "source": "configmap",
        "uri": "edgecommons-config-component-config/catalog.json"
      },
      "hierarchy": {
        "levels": ["enterprise", "site", "zone", "line", "device"]
      },
      "nodes": {
        "enterprise/acme": {
          "scope": { "enterprise": "acme" },
          "config": {
            "hierarchy": {
              "levels": ["enterprise", "site", "zone", "line", "device"]
            },
            "identity": { "enterprise": "acme" },
            "logging": { "level": "INFO" },
            "heartbeat": {
              "enabled": true,
              "intervalSecs": 5,
              "destination": "local",
              "measures": {
                "cpu": false,
                "memory": false,
                "disk": false,
                "files": false,
                "threads": false,
                "fds": false
              }
            },
            "metricEmission": {
              "namespace": "edgecommons_hierarchical"
            },
            "messaging": {
              "local": {
                "type": "mqtt",
                "host": "edgecommons-emqx",
                "port": 1883
              }
            },
            "tags": {
              "lineageMarker": "k8s-hierarchical-initial"
            }
          }
        },
        "site/integration-lab": {
          "parent": "enterprise/acme",
          "scope": {
            "enterprise": "acme",
            "site": "integration-lab"
          },
          "config": { "identity": { "site": "integration-lab" } }
        },
        "zone/k8s-zone": {
          "parent": "site/integration-lab",
          "scope": {
            "enterprise": "acme",
            "site": "integration-lab",
            "zone": "k8s-zone"
          },
          "config": { "identity": { "zone": "k8s-zone" } }
        },
        "line/line-7": {
          "parent": "zone/k8s-zone",
          "scope": {
            "enterprise": "acme",
            "site": "integration-lab",
            "zone": "k8s-zone",
            "line": "line-7"
          },
          "config": { "identity": { "line": "line-7" } }
        }
      },
      "components": {
        "JavaComponentSkeleton": {
          "parent": "line/line-7",
          "config": {
            "component": {
              "token": "java-component-skeleton",
              "global": {
                "publish_interval": 5,
                "unique_token": "JavaComponentSkeleton"
              },
              "instances": []
            }
          }
        },
        "PythonComponentSkeleton": {
          "parent": "line/line-7",
          "config": {
            "component": {
              "token": "python-component-skeleton",
              "global": {
                "publish_interval": 5,
                "unique_token": "PythonComponentSkeleton"
              },
              "instances": []
            }
          }
        },
        "RustComponentSkeleton": {
          "parent": "line/line-7",
          "config": {
            "component": {
              "token": "rust-component-skeleton",
              "global": {
                "publish_interval": 5,
                "unique_token": "RustComponentSkeleton"
              },
              "instances": []
            }
          }
        },
        "TsComponentSkeleton": {
          "parent": "line/line-7",
          "config": {
            "component": {
              "token": "ts-component-skeleton",
              "global": {
                "publish_interval": 5,
                "unique_token": "TsComponentSkeleton"
              },
              "instances": []
            }
          }
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edgecommons-skeleton-bootstrap
data:
  java-messaging.json: |-
    { "messaging": { "local": { "type": "mqtt", "host": "edgecommons-emqx", "port": 1883, "clientId": "edgecommons-java-skeleton" } } }
  python-messaging.json: |-
