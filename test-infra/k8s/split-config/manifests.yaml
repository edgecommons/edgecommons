apiVersion: v1
kind: ConfigMap
metadata:
  name: edgecommons-config-component-config
data:
  config.json: |-
    {
      "logging": {
        "level": "INFO"
      },
      "heartbeat": {
        "enabled": true,
        "intervalSecs": 5,
        "destination": "local",
        "measures": {
          "cpu": false,
          "memory": false,
          "disk": false,
          "files": false,
          "threads": false,
          "fds": false
        }
      },
      "metricEmission": {
        "namespace": "edgecommons_split"
      },
      "messaging": {
        "local": {
          "type": "mqtt",
          "host": "edgecommons-emqx",
          "port": 1883,
          "clientId": "edgecommons-config-component"
        }
      },
      "component": {
        "token": "edgecommons-config-component",
        "global": {
          "configComponent": {
            "catalogSource": {
              "type": "configmap",
              "mountDir": "/etc/edgecommons/config",
              "key": "catalog.json",
              "watch": true
            },
            "pushOnCatalogReload": true,
            "allowVolatileCatalogUpdates": true
          }
        },
        "instances": []
      }
    }
  catalog.json: |-
    {
      "schemaVersion": 1,
      "version": "k8s-split-initial",
      "provenance": {
        "source": "configmap",
        "uri": "edgecommons-config-component-config/catalog.json"
      },
      "base": {
        "logging": {
          "level": "INFO"
        },
        "heartbeat": {
          "enabled": true,
          "intervalSecs": 5,
          "destination": "local",
          "measures": {
            "cpu": false,
            "memory": false,
            "disk": false,
            "files": false,
            "threads": false,
            "fds": false
          }
        },
        "metricEmission": {
          "namespace": "edgecommons_split"
        },
        "messaging": {
          "local": {
            "type": "mqtt",
            "host": "edgecommons-emqx",
            "port": 1883
          }
        },
        "tags": {
          "sharedLayer": "k8s-split-initial",
          "site": "integration-lab"
        }
      },
      "components": {
        "JavaComponentSkeleton": {
          "component": {
            "token": "java-component-skeleton",
            "global": {
              "publish_interval": 5,
              "unique_token": "JavaComponentSkeleton"
            },
            "instances": []
          }
        },
        "PythonComponentSkeleton": {
          "component": {
            "token": "python-component-skeleton",
            "global": {
              "publish_interval": 5,
              "unique_token": "PythonComponentSkeleton"
            },
            "instances": []
          }
        },
        "RustComponentSkeleton": {
          "component": {
            "token": "rust-component-skeleton",
            "global": {
              "publish_interval": 5,
              "unique_token": "RustComponentSkeleton"
            },
            "instances": []
          }
        },
        "TsComponentSkeleton": {
          "component": {
            "token": "ts-component-skeleton",
            "global": {
              "publish_interval": 5,
              "unique_token": "TsComponentSkeleton"
            },
            "instances": []
          }
        }
      }
    }
---
