apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgecommons-config-component
  labels:
    app.kubernetes.io/name: edgecommons-config-component
    app.kubernetes.io/part-of: edgecommons-split-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edgecommons-config-component
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgecommons-config-component
        app.kubernetes.io/part-of: edgecommons-split-config
    spec:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: config-component
          image: edgecommons-config-component:split-ci
          imagePullPolicy: IfNotPresent
          args:
            - "--platform"
            - "KUBERNETES"
            - "--transport"
            - "MQTT"
            - "/etc/edgecommons/config/config.json"
            - "-c"
            - "CONFIGMAP"
            - "/etc/edgecommons/config"
            - "config.json"
            - "-t"
            - "edgecommons-k8s-split"
          env:
            - name: EDGECOMMONS_THING_NAME
              value: edgecommons-k8s-split
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: health
              containerPort: 8081
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/edgecommons/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: edgecommons-config-component-config
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgecommons-java-skeleton
  labels:
    app.kubernetes.io/name: edgecommons-java-skeleton
    app.kubernetes.io/part-of: edgecommons-split-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edgecommons-java-skeleton
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edgecommons-java-skeleton
        app.kubernetes.io/part-of: edgecommons-split-config
    spec:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: skeleton
          image: edgecommons-java-skeleton:split-ci
          imagePullPolicy: IfNotPresent
          args: ["--platform", "KUBERNETES", "--transport", "MQTT", "/etc/edgecommons/bootstrap/java-messaging.json", "-c", "CONFIG_COMPONENT", "-t", "edgecommons-k8s-split"]
          env:
            - name: EDGECOMMONS_THING_NAME
              value: edgecommons-k8s-split
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: health
              containerPort: 8081
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/edgecommons/bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap
          configMap:
            name: edgecommons-skeleton-bootstrap
        - name: tmp
          emptyDir: {}
---
