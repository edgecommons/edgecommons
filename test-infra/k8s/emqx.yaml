# In-cluster EMQX MQTT broker for the edgecommons Phase-1a smoke test.
#
# The in-cluster realization of test-infra/compose.yaml's EMQX (DESIGN-subsystems §2,
# DESIGN-packaging §10). Components reach it by the Service DNS name `edgecommons-emqx`
# (FQDN: edgecommons-emqx.<namespace>.svc.cluster.local) on plaintext port 1883.
#
# Apply into the same namespace as the component release, e.g.:
#   kubectl apply -n edgecommons -f test-infra/k8s/emqx.yaml
#   kubectl -n edgecommons rollout status deploy/edgecommons-emqx
#
# Plaintext 1883 only — sufficient for the local-broker smoke test. Mutual-TLS (8883)
# is exercised by the existing test-infra/compose.yaml harness, not needed here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgecommons-emqx
  labels:
    app: edgecommons-emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgecommons-emqx
  template:
    metadata:
      labels:
        app: edgecommons-emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:latest
          ports:
            - { name: mqtt, containerPort: 1883 }
            - { name: dashboard, containerPort: 18083 }
          env:
            # Allow anonymous connections (no auth) — matches the local compose broker.
            - { name: EMQX_ALLOW_ANONYMOUS, value: "true" }
          readinessProbe:
            tcpSocket: { port: 1883 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 1883 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: edgecommons-emqx
  labels:
    app: edgecommons-emqx
spec:
  type: ClusterIP
  selector:
    app: edgecommons-emqx
  ports:
    - { name: mqtt, port: 1883, targetPort: 1883, protocol: TCP }
