# Single-node kind cluster for the ggcommons Phase-1a Kubernetes smoke test.
#
#   kind create cluster --name ggcommons --config test-infra/k8s/kind-config.yaml
#   kind load docker-image ggcommons-component:ci --name ggcommons
#
# A single node is enough for the CONFIGMAP source + ..data hot-reload test; no
# durable streaming PVC (StatefulSet) is exercised in 1a.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ggcommons
nodes:
  - role: control-plane
    # extraPortMappings are not required for the in-cluster smoke test (the broker is
    # reached by Service DNS and assertions read pod logs via kubectl). Uncomment to
    # expose the future health/metrics ports to the host for manual poking.
    # extraPortMappings:
    #   - { containerPort: 30081, hostPort: 8081 }   # health (1c)
    #   - { containerPort: 30090, hostPort: 9090 }   # metrics (1c)
