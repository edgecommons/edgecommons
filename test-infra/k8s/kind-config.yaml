# Single-node kind cluster for the edgecommons Phase-1a Kubernetes smoke test.
#
#   kind create cluster --name edgecommons --config test-infra/k8s/kind-config.yaml
#   kind load docker-image edgecommons-component:ci --name edgecommons
#
# A single node is enough for the CONFIGMAP source + ..data hot-reload test; no
# durable streaming PVC (StatefulSet) is exercised in 1a.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: edgecommons
nodes:
  - role: control-plane
    # Do not pin a bleeding-edge node image here. kind's image-loading path must understand the
    # node image's containerd config format; Kubernetes 1.36 node images use containerd config v4,
    # which currently breaks `kind load docker-image` on GitHub runners before the smoke can run.
    # Let the pinned kind binary choose its compatible default node image.
    # Make ConfigMap→volume propagation fast and deterministic for the ..data hot-reload
    # test. The kubelet refreshes a mounted ConfigMap on its sync loop; at the 1m default
    # `syncFrequency` (+ cache TTL) a patched ConfigMap can take minutes to reach the pod —
    # which flaked the smoke on slow CI runners. `Watch` detection + a short sync make the
    # swap land within ~`syncFrequency`. (Local kind/k3s already propagate quickly.)
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        syncFrequency: 15s
        configMapAndSecretChangeDetectionStrategy: Watch
    # extraPortMappings are not required for the in-cluster smoke test (the broker is
    # reached by Service DNS and assertions read pod logs via kubectl). Uncomment to
    # expose the future health/metrics ports to the host for manual poking.
    # extraPortMappings:
    #   - { containerPort: 30081, hostPort: 8081 }   # health (1c)
    #   - { containerPort: 30090, hostPort: 9090 }   # metrics (1c)
