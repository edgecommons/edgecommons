# Shared local MQTT broker (EMQX) for edgecommons integration tests across the
# Java, Python, and Rust libraries.
#
# Exposes:
#   1883  - plaintext MQTT (used by the non-TLS standalone integration tests)
#   8883  - TLS MQTT, mutual TLS (broker presents tls-certs/server.crt, verified by
#           clients against tls-certs/ca.crt; clients must present a cert signed by
#           that same CA)
#   18083 - EMQX dashboard
#
# Usage:
#   bash gen-tls-certs.sh                 # once, to create ./tls-certs
#   docker compose up -d                  # start the broker
#   docker compose down                   # stop + remove
#
# For a server-only TLS listener instead of mutual, delete the VERIFY and
# FAIL_IF_NO_PEER_CERT lines below.
services:
  emqx:
    image: emqx/emqx:latest
    container_name: edgecommons-emqx
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - ./tls-certs:/certs:ro
    environment:
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE: /certs/ca.crt
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /certs/server.crt
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /certs/server.key
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: verify_peer
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "true"
