---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.ggcommons.JavaShadowVerify"
ComponentVersion: "1.0.0"
ComponentDescription: "On-device verification (Java) of the sanitized default SHADOW name: -c SHADOW with no name -> shadow 'com_ggcommons_JavaShadowVerify'."
ComponentPublisher: "ggcommons"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
  aws.greengrass.ShadowManager:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.ggcommons.JavaShadowVerify:pubsub:1":
          policyDescription: "Allow pub/sub on all local IPC topics (incl. shadow event topics)."
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.ggcommons.JavaShadowVerify:shadow:1":
          policyDescription: "Allow get/update of thing shadows."
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET/com.ggcommons.JavaShadowVerify/1.0.0/shadow-verify.jar"
    Lifecycle:
      Run:
        RequiresPrivilege: true
        Script: "java -jar {artifacts:path}/shadow-verify.jar -c SHADOW"
