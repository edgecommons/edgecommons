---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.mbreissi.edgecommons.TsIpcVerify"
ComponentVersion: "1.0.2"
ComponentDescription: "On-device GREENGRASS-mode IPC verification for the edgecommons TypeScript library (cross-language heartbeat ingest + request/reply + raw)."
ComponentPublisher: "edgecommons"
ComponentConfiguration:
  DefaultConfiguration:
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.edgecommons.TsIpcVerify:ipc:1":
          policyDescription: "Allow pub/sub on all IPC topics for the interop verification."
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET/com.mbreissi.edgecommons.TsIpcVerify/1.0.2/tsverify.zip"
        Unarchive: ZIP
    Lifecycle:
      Run:
        RequiresPrivilege: true
        Script: "node {artifacts:decompressedPath}/tsverify/dist/ipc_verify.js"
