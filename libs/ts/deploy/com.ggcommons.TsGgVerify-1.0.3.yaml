---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.ggcommons.TsGgVerify"
ComponentVersion: "1.0.3"
ComponentDescription: "GREENGRASS-mode lifecycle verification (SHADOW variant): config sourced from the named device shadow 'TsGgVerify' via ShadowManager over IPC."
ComponentPublisher: "ggcommons"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
  aws.greengrass.ShadowManager:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.ggcommons.TsGgVerify:pubsub:1":
          policyDescription: "Allow pub/sub on all local IPC topics (incl. shadow event topics)."
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.ggcommons.TsGgVerify:mqttproxy:1":
          policyDescription: "Allow pub/sub on all IoT Core topics."
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.ggcommons.TsGgVerify:shadow:1":
          policyDescription: "Allow get/update of thing shadows."
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET/com.ggcommons.TsGgVerify/1.0.3/tsverify.zip"
        Unarchive: ZIP
    Lifecycle:
      Run:
        RequiresPrivilege: true
        Script: "node {artifacts:decompressedPath}/tsverify/dist/gg_verify.js -c SHADOW TsGgVerify"
