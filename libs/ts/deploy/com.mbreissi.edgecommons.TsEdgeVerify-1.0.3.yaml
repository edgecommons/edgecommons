---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.mbreissi.edgecommons.TsEdgeVerify"
ComponentVersion: "1.0.3"
ComponentDescription: "GREENGRASS-mode lifecycle verification (SHADOW variant): config sourced from the named device shadow 'TsEdgeVerify' via ShadowManager over IPC."
ComponentPublisher: "edgecommons"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
  aws.greengrass.ShadowManager:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.edgecommons.TsEdgeVerify:pubsub:1":
          policyDescription: "Allow pub/sub on all local IPC topics (incl. shadow event topics)."
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.mbreissi.edgecommons.TsEdgeVerify:mqttproxy:1":
          policyDescription: "Allow pub/sub on all IoT Core topics."
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.mbreissi.edgecommons.TsEdgeVerify:shadow:1":
          policyDescription: "Allow get/update of thing shadows."
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET/com.mbreissi.edgecommons.TsEdgeVerify/1.0.3/tsverify.zip"
        Unarchive: ZIP
    Lifecycle:
      Run:
        RequiresPrivilege: true
        Script: "node {artifacts:decompressedPath}/tsverify/dist/edge_verify.js -c SHADOW TsEdgeVerify"
