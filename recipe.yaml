---
RecipeFormatVersion: "2020-01-25"
ComponentName: "{COMPONENT_NAME}"
ComponentVersion: "{COMPONENT_VERSION}"
ComponentDescription: "This is simple Hello World component written in Java using GGCommons."
ComponentPublisher: "{COMPONENT_AUTHOR}"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5p] %C{1} (%L) [%t] : %m%n"
      heartbeat:
        intervalSecs: 5
        targets:
          - type: "messaging"
            config:
              destination: "ipc"
        measures:
          cpu: true
          memory: true
          disk: false
          fds: true
          files: true
      tags:
        appId: "Test"
        site: "Chantilly"
        shop: "test_shop"
        line: "test_line"
      metricEmission:
        target: "log"
        targetConfig:
          logFileName: "/greengrass/v2/logs/{ComponentFullName}.metric.log"
      component:
        global:
          'publish_interval': 3
          'message': "Hello World!"
        instances:
          - id: "first"
            instance_specific_tag: "dummy1"
          - id: "second"
            instance_specific_tag: "dummy2"
    accessControl:
      aws.greengrass.ipc.pubsub:
        "aws.proserve.greengrass.JavaComponentSkeleton:ipc:1":
          policyDescription: Allows access to publish/subscribe to all topics on IPC
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "aws.proserve.greengrass.JavaComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "aws.proserve.greengrass.JavaComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/java-component-skeleton-1.0.0.jar"
    Lifecycle:
      Run:
        Setenv:
          CONFIG: "{configuration:/ComponentConfig}"
        RequiresPrivilege: true
        Script:
          "java -cp {artifacts:path}/java-component-skeleton-1.0.0.jar com.aws.proserve.javacomponentskeleton.App"