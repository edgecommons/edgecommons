---
RecipeFormatVersion: "2020-01-25"
ComponentName: "{COMPONENT_NAME}"
ComponentVersion: "{COMPONENT_VERSION}"
ComponentDescription: "<<DESCRIPTION>>"
ComponentPublisher: "{COMPONENT_AUTHOR}"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
      heartbeat:
        intervalSecs: 5
        targets:
          - type: "metric"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "ggcommons"
        # Component work dir — writable by a non-root (ggc_user) component.
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      tags:
        appId: "Test"
        site: "Chantilly"
      component:
        global:
          publish_interval: 3
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "<<COMPONENTFULLNAME>>:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all local topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "<<COMPONENTFULLNAME>>:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "<<COMPONENTFULLNAME>>:shadow:1":
          policyDescription: Allows access to thing shadows.
          operations:
            - "aws.greengrass#GetThingShadow"
            - "aws.greengrass#UpdateThingShadow"
            - "aws.greengrass#DeleteThingShadow"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/<<BINNAME>>"
        Permissions:
          Read: ALL
          Execute: ALL
    Lifecycle:
      # Ensure the artifact is executable regardless of how it was staged (robust for
      # non-root run-as users and local `greengrass-cli` deployments).
      Install:
        Script: "chmod +x {artifacts:path}/<<BINNAME>>"
      # Runs in GREENGRASS mode (default), reading config from the deployment (GG_CONFIG).
      Run:
        Script: "{artifacts:path}/<<BINNAME>> -c GG_CONFIG"
