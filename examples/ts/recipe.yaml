---
RecipeFormatVersion: "2020-01-25"
ComponentName: "aws.proserve.greengrass.TsComponentSkeleton"
ComponentVersion: "1.0.0"
ComponentDescription: "Skeleton TypeScript component built on the ggcommons TypeScript library: standardized configuration, logging, messaging, metrics, and heartbeats."
ComponentPublisher: "Marc Breissinger"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
      heartbeat:
        intervalSecs: 5
        # Heartbeat publishes via the metric service. (A messaging-target heartbeat
        # is also available — it uses the mode's messaging service.)
        targets:
          - type: "metric"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "ggcommons"
        # Component work dir — writable by a non-root (ggc_user) component.
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      # Credentials / encrypted local vault (read only when a `credentials` section is present;
      # inert otherwise). The library opens the vault at startup; the component reads its secrets
      # via gg.credentials(). Paths live under the component work dir (writable by ggc_user).
      # For central sync from AWS Secrets Manager over TES, add a `central` block here
      # (type: awsSecretsManager, region, sync.secrets: [...]).
      credentials:
        vault:
          path: "/greengrass/v2/work/{ComponentFullName}/vault"
          keyProvider:
            type: "file"
            keyPath: "/greengrass/v2/work/{ComponentFullName}/vault.key"
      # Parameters / externalized config (read only when a `parameters` section is present; inert
      # otherwise). The library opens the parameter store at startup; the component reads via
      # gg.parameters(). The `env` source needs no AWS — names map to env vars under the prefix
      # (e.g. /skeleton/region -> GG_PARAM_SKELETON_REGION). For AWS SSM Parameter Store instead,
      # use source.type "awsSsm" (region, withDecryption) — it reads via TES, no extra config.
      parameters:
        source:
          type: "env"
          prefix: "GG_PARAM_"
        refreshIntervalSecs: 300
        sync:
          names:
            - "/skeleton/region"
            - "/skeleton/poolSize"
      tags:
        appId: "Test"
        site: "Chantilly"
        shop: "test_shop"
        line: "test_line"
      component:
        global:
          publish_interval: 3
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "aws.proserve.greengrass.TsComponentSkeleton:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "aws.proserve.greengrass.TsComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "aws.proserve.greengrass.TsComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/ts-component-skeleton.zip"
        Unarchive: ZIP
    Lifecycle:
      # The ZIP bundles dist/, node_modules/ and package.json, so the component runs
      # the prebuilt JS directly (no install step on-device). Runs in GREENGRASS mode
      # (default), reading config from the deployment (GG_CONFIG), as the default component
      # user (ggc_user) — no elevated privilege needed (GG IPC + the vault under the
      # ggc_user-owned work dir work unprivileged).
      Run:
        Script: "node {artifacts:decompressedPath}/ts-component-skeleton/dist/main.js -c GG_CONFIG"
