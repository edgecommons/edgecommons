---
RecipeFormatVersion: "2020-01-25"
ComponentName: "{COMPONENT_NAME}"
ComponentVersion: "{COMPONENT_VERSION}"
ComponentDescription: "This is simple Hello World component written in Java using GGCommons."
ComponentPublisher: "{COMPONENT_AUTHOR}"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        java_format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5p] %C{1} (%L) [%t] : %m%n"
      # Heartbeat = the library-owned UNS `state` keepalive (ecv1/{device}/{component}/main/state)
      # + the enabled measures emitted as the metric 'sys'. No targets[] — the block is optional
      # {enabled, intervalSecs, measures, destination} and defaults to on / 5 s / local.
      heartbeat:
        enabled: true
        intervalSecs: 5
        destination: "local"
        measures:
          cpu: true
          memory: true
          disk: false
          fds: true
          files: true
      # UNS identity: ordered hierarchy levels (last = the resolved thing name) + a value for
      # every level above it. Stamped into each envelope's `identity` block and every gg.getUns()
      # topic.
      hierarchy:
        levels: ["site", "device"]
      identity:
        site: "Chantilly"
      tags:
        appId: "Test"
        shop: "test_shop"
        line: "test_line"
      metricEmission:
        target: "cloudwatch"
        targetConfig:
          intervalSecs: 5
      # Credentials / encrypted local vault. The library opens the vault at startup; the component
      # reads its secrets via gg.getCredentials(). Paths live under the component work dir (writable
      # by ggc_user). For central sync from AWS Secrets Manager over TES, add a `central` block here
      # (type: awsSecretsManager, region, sync.secrets: [...]).
      credentials:
        vault:
          path: "/greengrass/v2/work/{ComponentFullName}/vault"
          keyProvider:
            type: "file"
            keyPath: "/greengrass/v2/work/{ComponentFullName}/vault.key"
      # Parameters / offline-first configuration values. The library opens the parameter service at
      # startup; the component reads values via gg.getParameters(). This example uses the `env` source
      # (no AWS, no RBAC): a parameter "/skeleton/region" maps to env var GG_PARAM_SKELETON_REGION.
      # `env`/`mountedDir` are already-local sources, so the cache is in-memory (no persisted copy).
      # For AWS SSM Parameter Store, switch source.type to "awsSsm" (region + sync.paths) and add a
      # `cache` block (persist: true, path, keyProvider) for offline resilience.
      parameters:
        source:
          type: "env"
          prefix: "GG_PARAM_"
        refreshIntervalSecs: 300
        bootstrapOnStart: true
        sync:
          names:
            - "/skeleton/region"
            - "/skeleton/poolSize"
      component:
        global:
          'publish_interval': 3
          'message': "Hello World!"
        instances:
          - id: "first"
            instance_specific_tag: "dummy1"
          - id: "second"
            instance_specific_tag: "dummy2"
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.greengrass.JavaComponentSkeleton:ipc:1":
          policyDescription: Allows access to publish/subscribe to all topics on IPC
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.mbreissi.greengrass.JavaComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.mbreissi.greengrass.JavaComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/java-component-skeleton-1.0.0.jar"
    Lifecycle:
      # Runs as the default Greengrass component user (ggc_user) — no elevated privilege needed:
      # GG IPC, TES-backed CloudWatch, and the vault under the ggc_user-owned work dir all work
      # unprivileged. (Root is a least-privilege violation; only add RequiresPrivilege if a
      # component genuinely needs it.)
      Run:
        Script:
          "java -jar {artifacts:path}/java-component-skeleton-1.0.0.jar --platform GREENGRASS"