---
RecipeFormatVersion: "2020-01-25"
ComponentName: "aws.proserve.greengrass.RustComponentSkeleton"
ComponentVersion: "1.0.0"
ComponentDescription: "Skeleton Rust component built on the ggcommons Rust library: standardized configuration, logging, messaging, metrics, and heartbeats."
ComponentPublisher: "Marc Breissinger"
# Declaring the TokenExchangeService dependency is what makes the Nucleus inject
# AWS_CONTAINER_CREDENTIALS_FULL_URI into the component env, so the AWS SDK default
# credential chain (used by the Kinesis streaming sink) resolves the device role.
# Only needed for builds that include `streaming-kinesis` (or `cloudwatch`).
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=0.0.0"
    DependencyType: HARD
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
      heartbeat:
        intervalSecs: 5
        # Heartbeat publishes via the metric service. (A messaging-target heartbeat
        # is also available — it uses the mode's messaging service.)
        targets:
          - type: "metric"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "ggcommons"
        # Component work dir — writable by a non-root (ggc_user) component.
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      # Telemetry streaming (read only by builds that include the `streaming`/`streaming-kinesis`
      # feature; inert otherwise). The library opens + recovers this stream at startup and runs an
      # export engine that drains the durable buffer to Kinesis using TES creds. Stats for the
      # stream are auto-bridged to the metric target above (metric name `stream:telemetry`).
      streaming:
        streams:
          - name: "telemetry"
            sink:
              type: "kinesis"
              # The Kinesis data stream must already exist in this region, and the device's TES
              # IAM role must allow kinesis:PutRecords on it. {ThingName} templates per device.
              streamName: "ggcommons-skeleton-telemetry"
              region: "us-east-1"
            buffer:
              path: "/greengrass/v2/work/{ComponentFullName}/stream-telemetry"
              segmentBytes: 1048576
              maxDiskBytes: 67108864
              # dropOldest keeps the component alive (and the publish loop unblocked) if the disk
              # budget fills during a long sink outage; dropped records show up in `droppedTotal`.
              onFull: "dropOldest"
            delivery:
              pollIntervalMs: 1000
      # Credentials / encrypted local vault (read only by builds that include the `credentials`
      # feature; inert otherwise). The library opens the vault at startup; the component reads its
      # secrets via gg.credentials(). Paths live under the component work dir (writable by ggc_user).
      # For central sync from AWS Secrets Manager over TES, build with `credentials-aws` and add a
      # `central` block here (type: awsSecretsManager, region, sync.secrets: [...]).
      credentials:
        vault:
          path: "/greengrass/v2/work/{ComponentFullName}/vault"
          keyProvider:
            type: "file"
            keyPath: "/greengrass/v2/work/{ComponentFullName}/vault.key"
      tags:
        appId: "Test"
        site: "Chantilly"
        shop: "test_shop"
        line: "test_line"
      component:
        global:
          publish_interval: 3
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "aws.proserve.greengrass.RustComponentSkeleton:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "aws.proserve.greengrass.RustComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "aws.proserve.greengrass.RustComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/rust-component-skeleton"
    Lifecycle:
      # Make the binary executable (an artifact Permissions block is rejected by
      # CreateComponentVersion; chmod is robust for non-root and local deploys).
      Install:
        Script: "chmod +x {artifacts:path}/rust-component-skeleton"
      # Runs in GREENGRASS mode (default) reading config from the deployment (GG_CONFIG).
      Run:
        Script: "{artifacts:path}/rust-component-skeleton -c GG_CONFIG"
