---
RecipeFormatVersion: "2020-01-25"
ComponentName: "aws.proserve.greengrass.RustComponentSkeleton"
ComponentVersion: "1.0.0"
ComponentDescription: "Skeleton Rust component built on the ggcommons Rust library: standardized configuration, logging, messaging, metrics, and heartbeats."
ComponentPublisher: "Marc Breissinger"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
      heartbeat:
        intervalSecs: 5
        # Heartbeat publishes via the metric service. (A messaging-target heartbeat
        # is also available — it uses the mode's messaging service.)
        targets:
          - type: "metric"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "log"
        namespace: "ggcommons"
        # Component work dir — writable by a non-root (ggc_user) component.
        targetConfig:
          logFileName: "/greengrass/v2/work/{ComponentFullName}/metric.log"
      tags:
        appId: "Test"
        site: "Chantilly"
        shop: "test_shop"
        line: "test_line"
      component:
        global:
          publish_interval: 3
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "aws.proserve.greengrass.RustComponentSkeleton:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "aws.proserve.greengrass.RustComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "aws.proserve.greengrass.RustComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/rust-component-skeleton"
    Lifecycle:
      # Make the binary executable (an artifact Permissions block is rejected by
      # CreateComponentVersion; chmod is robust for non-root and local deploys).
      Install:
        Script: "chmod +x {artifacts:path}/rust-component-skeleton"
      # Runs in GREENGRASS mode (default) reading config from the deployment (GG_CONFIG).
      Run:
        Script: "{artifacts:path}/rust-component-skeleton -c GG_CONFIG"
