---
RecipeFormatVersion: "2020-01-25"
ComponentName: "{COMPONENT_NAME}"
ComponentVersion: "{COMPONENT_VERSION}"
ComponentDescription: "This is a skeleton python component supporting standardized configuration, logging, messaging and heartbeats."
ComponentPublisher: "{COMPONENT_AUTHOR}"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        python_format: "%(asctime)s [%(levelname)s] %(filename)s %(funcName)s(%(lineno)d) [%(threadName)s]: %(message)s"
      heartbeat:
        intervalSecs: 5
        targets:
          - type: "messaging"
            config:
              destination: "ipc"
              topic: "heartbeat/{ThingName}/{ComponentName}"
        measures:
          cpu: true
          memory: true
          disk: false
      metricEmission:
        target: "cloudwatch"
        namespace: "ggcommons"
        targetConfig:
          intervalSecs: 10
      # Credentials / encrypted local vault (read only when a `credentials` section is present;
      # inert otherwise). The library opens the vault at startup; the component reads its secrets
      # via gg.get_credentials(). Paths live under the component work dir (writable by ggc_user).
      # For central sync from AWS Secrets Manager over TES, add a `central` block here
      # (type: awsSecretsManager, region, sync.secrets: [...]).
      credentials:
        vault:
          path: "/greengrass/v2/work/{ComponentFullName}/vault"
          keyProvider:
            type: "file"
            keyPath: "/greengrass/v2/work/{ComponentFullName}/vault.key"
      # Externalized configuration parameters (read only when a `parameters` section is present;
      # inert otherwise). The library opens the parameter service at startup; the component reads
      # values via gg.get_parameters() from an offline-first local cache. Below uses the `env`
      # source (no AWS): /skeleton/region maps to env var GG_PARAM_SKELETON_REGION, etc.
      # For AWS SSM Parameter Store, set source.type: awsSsm (region, withDecryption) -- a remote
      # source persists the cache encrypted under the component work dir so values survive offline.
      parameters:
        source:
          type: "env"
          prefix: "GG_PARAM_"
        refreshIntervalSecs: 300
        sync:
          names:
            - "/skeleton/region"
            - "/skeleton/poolSize"
      tags:
        appId: "Test"
        site: "Chantilly"
        shop: "test_shop"
        line: "test_line"
      component:
        global:
          'publish_interval': 3
        instances: []
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.greengrass.PythonComponentSkeleton:pubsub:1":
          policyDescription: Allows access to publish/subscribe to all topics.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.mbreissi.greengrass.JavaComponentSkeleton:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
      aws.greengrass.ShadowManager:
        "com.mbreissi.greengrass.PythonComponentSkeleton:shadow:1":
          policyDescription: Allows access to shadows.
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
            - 'aws.greengrass#DeleteThingShadow'
          resources:
            - "*"
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/python-component-skeleton.zip"
        Unarchive: ZIP
    Lifecycle:
      Install:
        Script: |-
          pip3 install --user -r {artifacts:decompressedPath}/python-component-skeleton/requirements.txt
      Run:
        Script: |-
          python3 -u {artifacts:decompressedPath}/python-component-skeleton/main.py --platform GREENGRASS