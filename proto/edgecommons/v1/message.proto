syntax = "proto3";

package edgecommons.v1;

option java_multiple_files = true;
option java_package = "com.mbreissi.edgecommons.proto.v1";

import "edgecommons/v1/command.proto";
import "edgecommons/v1/config.proto";
import "edgecommons/v1/event.proto";
import "edgecommons/v1/metrics.proto";
import "edgecommons/v1/state.proto";
import "edgecommons/v1/telemetry.proto";
import "edgecommons/v1/value.proto";

message EdgeCommonsMessage {
  Header header = 1;
  optional Identity identity = 2;
  map<string, EcValue> tags = 3;

  string content_type = 4;
  string content_encoding = 5;
  BodySchema schema = 6;

  oneof body {
    SouthboundSignalUpdate southbound_signal_update = 20;
    StateUpdate state_update = 21;
    ConfigUpdate config_update = 22;
    MetricUpdate metric_update = 23;
    EventMessage event = 24;
    CommandMessage command = 25;
    EcValue structured = 30;
    bytes opaque = 31;
  }
}

message Header {
  string name = 1;
  string version = 2;
  uint64 timestamp_ms = 3;
  string uuid = 4;
  optional string correlation_id = 5;
  optional string reply_to = 6;
}

message Identity {
  repeated HierEntry hier = 1;
  string path = 2;
  string component = 3;
  string instance = 4;
}

message HierEntry {
  string level = 1;
  string value = 2;
}

message BodySchema {
  string name = 1;
  string version = 2;
  string content_type = 3;
  string descriptor_ref = 4;
  string hash = 5;
}
